<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>น้ำพริกน้ำย้อย เห็ดกรอบ - Tour Long น้ำพริกทัวร์ลง</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ─── Navbar ─── */
      const Navbar = ({ cartCount = 0 }) => (
        <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
          <a href="../home-page/home-page.html" className="flex items-center gap-3">
            <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
            <div>
              <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
              <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
            </div>
          </a>
          <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
            <a href="../home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
            <a href="products.html" className="hover:text-red-500 transition-colors">สินค้า</a>
            <a href="about.html" className="hover:text-red-500 transition-colors">เกี่ยวกับเรา</a>
            <a href="contact.html" className="hover:text-red-500 transition-colors">ติดต่อเรา</a>
          </nav>
          <div className="flex items-center gap-4">
            <a href="cart.html" className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
              🛒
              {cartCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{cartCount}</span>
              )}
            </a>
            <button className="lg:hidden text-white text-2xl">☰</button>
          </div>
        </header>
      );

      /* ─── Footer ─── */
      const Footer = () => (
        <footer className="bg-black py-16 border-t border-white/5">
          <div className="container mx-auto px-6 text-center">
            <div className="flex justify-center items-center gap-3 mb-6">
              <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
              <span className="font-black text-lg">TOUR LONG</span>
            </div>
            <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
              น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
            </p>
            <div className="flex justify-center gap-6 text-gray-400 text-sm">
              <a href="#" className="hover:text-white transition-colors">Facebook</a>
              <a href="#" className="hover:text-white transition-colors">Instagram</a>
              <a href="#" className="hover:text-white transition-colors">TikTok</a>
              <a href="#" className="hover:text-white transition-colors">Shopee</a>
              <a href="#" className="hover:text-white transition-colors">Lazada</a>
            </div>
            <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
              © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
            </div>
          </div>
        </footer>
      );

      /* ─── App ─── */
      const App = () => {
        const [qty, setQty] = useState(1);
        const [cartCount, setCartCount] = useState(0);

        const product = {
          name: "น้ำพริกน้ำย้อย เห็ดกรอบ",
          nameEn: "Numprik Numyoi Oyster Mushroom",
          price: 69,
          image: "/assets/images/green-pack.jpg",
          desc: "น้ำพริกน้ำย้อย สูตรเห็ดกรอบ อร่อยเข้มข้น ผลิตจากเห็ดนางฟ้าภูฐานกรอบ ผสมพริกแห้งคั่วหอม สูตรหวานน้อย ไม่ใส่ผงชูรส ปลอดภัยสำหรับทุกคนในครอบครัว ทานคู่กับข้าวสวยร้อนๆ หรือเป็นท็อปปิ้งจิ้มผักสดก็อร่อย",
        };

        const features = [
          { icon: "🌿", label: "ไม่ใส่ผงชูรส", detail: "ปลอดภัย 100%" },
          { icon: "🍯", label: "สูตรหวานน้อย", detail: "ดีต่อสุขภาพ" },
          { icon: "⚖️", label: "น้ำหนัก 50g", detail: "ต่อซอง" },
          { icon: "🔥", label: "พลังงาน 250 kcal", detail: "ต่อซอง" },
        ];

        const nutrition = [
          { label: "พลังงาน", value: "250 kcal" },
          { label: "โปรตีน", value: "8 g" },
          { label: "ไขมัน", value: "12 g" },
          { label: "คาร์โบไฮเดรต", value: "28 g" },
          { label: "น้ำตาล", value: "5 g" },
          { label: "โซเดียม", value: "380 mg" },
        ];

        const relatedProducts = [
          { id: 2, name: "น้ำพริกน้ำย้อย เผ็ดจี๊ด", price: 69, image: "/assets/images/red-pack.jpg", badge: "เผ็ด" },
          { id: 3, name: "น้ำพริกน้ำย้อย อกไก่แซ่บ", price: 69, image: "/assets/images/orange-pack.jpg", badge: "ใหม่" },
          { id: 4, name: "เซ็ต 3 ซอง สุดคุ้ม", price: 198, image: "/assets/images/promo-pack.png", badge: "คุ้มสุด" },
        ];

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600">
            <Navbar cartCount={cartCount} />

            {/* Breadcrumb */}
            <div className="px-6 md:px-16 py-6 text-sm text-gray-500">
              <a href="../home-page/home-page.html" className="hover:text-white transition-colors">หน้าแรก</a>
              <span className="mx-2">/</span>
              <a href="products.html" className="hover:text-white transition-colors">สินค้า</a>
              <span className="mx-2">/</span>
              <span className="text-white">{product.name}</span>
            </div>

            {/* Product Detail */}
            <section className="px-6 md:px-16 py-8">
              <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-12">
                {/* Left: Image */}
                <div className="w-full md:w-1/2">
                  <div className="relative">
                    <span className="absolute top-4 left-4 z-10 bg-red-600 text-white text-xs font-bold px-4 py-1.5 rounded-full">ขายดี</span>
                    <img src={product.image} alt={product.name} className="w-full aspect-square object-cover rounded-3xl border border-white/5" />
                  </div>
                </div>

                {/* Right: Info */}
                <div className="w-full md:w-1/2 flex flex-col justify-center">
                  <p className="text-xs text-gray-500 uppercase tracking-widest mb-2">{product.nameEn}</p>
                  <h1 className="text-4xl md:text-5xl font-black mb-4 leading-tight">{product.name}</h1>

                  <div className="flex items-baseline gap-3 mb-6">
                    <span className="text-4xl font-black text-red-500">฿{product.price}</span>
                    <span className="text-sm text-gray-500">/ ซอง</span>
                  </div>

                  <p className="text-gray-400 text-sm leading-relaxed mb-8">{product.desc}</p>

                  {/* Features */}
                  <div className="grid grid-cols-2 gap-4 mb-8">
                    {features.map((f, i) => (
                      <div key={i} className="flex items-center gap-3 bg-[#121212] border border-white/5 rounded-xl p-3">
                        <span className="text-xl">{f.icon}</span>
                        <div>
                          <p className="text-sm font-bold">{f.label}</p>
                          <p className="text-[10px] text-gray-500">{f.detail}</p>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* Quantity + Add to Cart */}
                  <div className="flex items-center gap-4 mb-6">
                    <div className="flex items-center bg-[#121212] border border-white/10 rounded-xl overflow-hidden">
                      <button onClick={() => setQty(q => Math.max(1, q - 1))} className="px-4 py-3 text-lg font-bold hover:bg-white/5 transition-colors">-</button>
                      <span className="px-6 py-3 text-lg font-bold min-w-[60px] text-center">{qty}</span>
                      <button onClick={() => setQty(q => q + 1)} className="px-4 py-3 text-lg font-bold hover:bg-white/5 transition-colors">+</button>
                    </div>
                    <button
                      onClick={() => setCartCount(c => c + qty)}
                      className="flex-1 bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold text-lg flex items-center justify-center gap-3 transition-transform hover:scale-105 active:scale-95"
                    >
                      🛒 เพิ่มลงตะกร้า
                    </button>
                  </div>

                  <p className="text-xs text-gray-600">รวม ฿{(product.price * qty).toLocaleString()}</p>
                </div>
              </div>
            </section>

            {/* Nutrition Info */}
            <section className="px-6 md:px-16 py-16 bg-[#080808]">
              <div className="max-w-2xl mx-auto">
                <h2 className="text-2xl font-black mb-8 text-center">ข้อมูลโภชนาการ <span className="text-gray-500 text-sm font-normal">/ ต่อ 1 ซอง (50g)</span></h2>
                <div className="bg-[#121212] border border-white/5 rounded-2xl overflow-hidden">
                  {nutrition.map((item, i) => (
                    <div key={i} className={`flex justify-between px-6 py-4 ${i < nutrition.length - 1 ? "border-b border-white/5" : ""}`}>
                      <span className="text-gray-400 text-sm">{item.label}</span>
                      <span className="font-bold text-sm">{item.value}</span>
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* Related Products */}
            <section className="px-6 md:px-16 py-20">
              <h2 className="text-3xl font-black text-center mb-12">สินค้าที่เกี่ยวข้อง</h2>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-[900px] mx-auto">
                {relatedProducts.map(item => (
                  <a key={item.id} href="product-detail.html" className="bg-[#121212] border border-white/5 rounded-3xl p-5 group hover:border-red-600/50 transition-all hover:-translate-y-2 block no-underline text-white">
                    <div className="relative mb-4">
                      {item.badge && <span className="absolute top-2 left-2 z-10 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full">{item.badge}</span>}
                      <img src={item.image} alt={item.name} className="w-full aspect-square object-cover rounded-2xl group-hover:scale-105 transition-transform duration-500" />
                    </div>
                    <h3 className="text-base font-bold mb-2 group-hover:text-red-500 transition-colors">{item.name}</h3>
                    <span className="text-lg font-black">฿{item.price}</span>
                  </a>
                ))}
              </div>
            </section>

            <Footer />
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
