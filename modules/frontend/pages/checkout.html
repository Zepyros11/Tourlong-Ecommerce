<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ชำระเงิน - Tour Long น้ำพริกทัวร์ลง</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ─── Navbar ─── */
      const Navbar = ({ cartCount = 0 }) => (
        <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
          <a href="../home-page/home-page.html" className="flex items-center gap-3">
            <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
            <div>
              <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
              <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
            </div>
          </a>
          <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
            <a href="../home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
            <a href="products.html" className="hover:text-red-500 transition-colors">สินค้า</a>
            <a href="about.html" className="hover:text-red-500 transition-colors">เกี่ยวกับเรา</a>
            <a href="contact.html" className="hover:text-red-500 transition-colors">ติดต่อเรา</a>
          </nav>
          <div className="flex items-center gap-4">
            <a href="cart.html" className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
              🛒
              {cartCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{cartCount}</span>
              )}
            </a>
            <button className="lg:hidden text-white text-2xl">☰</button>
          </div>
        </header>
      );

      /* ─── Footer ─── */
      const Footer = () => (
        <footer className="bg-black py-16 border-t border-white/5">
          <div className="container mx-auto px-6 text-center">
            <div className="flex justify-center items-center gap-3 mb-6">
              <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
              <span className="font-black text-lg">TOUR LONG</span>
            </div>
            <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
              น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
            </p>
            <div className="flex justify-center gap-6 text-gray-400 text-sm">
              <a href="#" className="hover:text-white transition-colors">Facebook</a>
              <a href="#" className="hover:text-white transition-colors">Instagram</a>
              <a href="#" className="hover:text-white transition-colors">TikTok</a>
              <a href="#" className="hover:text-white transition-colors">Shopee</a>
              <a href="#" className="hover:text-white transition-colors">Lazada</a>
            </div>
            <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
              © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
            </div>
          </div>
        </footer>
      );

      /* ─── Steps Indicator ─── */
      const Steps = () => {
        const steps = [
          { num: 1, label: "ตะกร้า", done: true },
          { num: 2, label: "ข้อมูลจัดส่ง", active: true },
          { num: 3, label: "ชำระเงิน", done: false },
          { num: 4, label: "เสร็จสิ้น", done: false },
        ];
        return (
          <div className="flex items-center justify-center gap-2 md:gap-4 py-10">
            {steps.map((s, i) => (
              <React.Fragment key={s.num}>
                <div className="flex items-center gap-2">
                  <div className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold ${
                    s.done ? "bg-green-600 text-white" : s.active ? "bg-red-600 text-white" : "bg-white/5 text-gray-500 border border-white/10"
                  }`}>
                    {s.done ? "✓" : s.num}
                  </div>
                  <span className={`text-sm font-bold hidden md:inline ${s.active ? "text-white" : s.done ? "text-green-500" : "text-gray-500"}`}>{s.label}</span>
                </div>
                {i < steps.length - 1 && (
                  <div className={`w-8 md:w-16 h-[2px] ${s.done ? "bg-green-600" : "bg-white/10"}`}></div>
                )}
              </React.Fragment>
            ))}
          </div>
        );
      };

      /* ─── App ─── */
      const App = () => {
        const [form, setForm] = useState({
          name: "", phone: "", email: "", address: "", subdistrict: "", district: "", province: "", zipcode: ""
        });
        const [payment, setPayment] = useState("transfer");

        const update = (key, val) => setForm(prev => ({ ...prev, [key]: val }));

        const orderItems = [
          { name: "น้ำพริกน้ำย้อย เห็ดกรอบ", qty: 2, price: 69, image: "/assets/images/green-pack.jpg" },
          { name: "น้ำพริกน้ำย้อย เผ็ดจี๊ด", qty: 1, price: 69, image: "/assets/images/red-pack.jpg" },
          { name: "เซ็ต 3 ซอง สุดคุ้ม", qty: 1, price: 198, image: "/assets/images/promo-pack.png" },
        ];

        const subtotal = orderItems.reduce((sum, item) => sum + item.price * item.qty, 0);
        const shipping = subtotal >= 500 ? 0 : 50;
        const total = subtotal + shipping;

        const inputClass = "w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors";

        const paymentMethods = [
          { key: "transfer", label: "โอนธนาคาร", icon: "🏦", desc: "โอนผ่านบัญชีธนาคาร" },
          { key: "promptpay", label: "พร้อมเพย์", icon: "📱", desc: "สแกน QR Code พร้อมเพย์" },
          { key: "cod", label: "เก็บเงินปลายทาง (COD)", icon: "📦", desc: "ชำระเงินเมื่อได้รับสินค้า +฿20" },
        ];

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600">
            <Navbar cartCount={4} />

            <Steps />

            <section className="px-6 md:px-16 pb-20">
              <div className="max-w-6xl mx-auto flex flex-col lg:flex-row gap-10">
                {/* Left: Shipping Form */}
                <div className="flex-1">
                  <h2 className="text-2xl font-black mb-8">ข้อมูลจัดส่ง</h2>

                  <div className="space-y-5">
                    <div>
                      <label className="block text-sm text-gray-400 mb-2">ชื่อ-นามสกุล</label>
                      <input type="text" placeholder="กรอกชื่อ-นามสกุล" value={form.name} onChange={e => update("name", e.target.value)} className={inputClass} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">เบอร์โทรศัพท์</label>
                        <input type="tel" placeholder="0XX-XXX-XXXX" value={form.phone} onChange={e => update("phone", e.target.value)} className={inputClass} />
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">อีเมล</label>
                        <input type="email" placeholder="email@example.com" value={form.email} onChange={e => update("email", e.target.value)} className={inputClass} />
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm text-gray-400 mb-2">ที่อยู่</label>
                      <textarea placeholder="บ้านเลขที่ ซอย ถนน" value={form.address} onChange={e => update("address", e.target.value)} rows={3} className={inputClass + " resize-none"}></textarea>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">ตำบล</label>
                        <input type="text" placeholder="ตำบล" value={form.subdistrict} onChange={e => update("subdistrict", e.target.value)} className={inputClass} />
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">อำเภอ</label>
                        <input type="text" placeholder="อำเภอ" value={form.district} onChange={e => update("district", e.target.value)} className={inputClass} />
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">จังหวัด</label>
                        <input type="text" placeholder="จังหวัด" value={form.province} onChange={e => update("province", e.target.value)} className={inputClass} />
                      </div>
                      <div>
                        <label className="block text-sm text-gray-400 mb-2">รหัสไปรษณีย์</label>
                        <input type="text" placeholder="XXXXX" value={form.zipcode} onChange={e => update("zipcode", e.target.value)} className={inputClass} />
                      </div>
                    </div>
                  </div>

                  {/* Payment Method */}
                  <h2 className="text-2xl font-black mt-12 mb-6">วิธีชำระเงิน</h2>
                  <div className="space-y-3">
                    {paymentMethods.map(pm => (
                      <button
                        key={pm.key}
                        onClick={() => setPayment(pm.key)}
                        className={`w-full flex items-center gap-4 p-4 rounded-xl border transition-all text-left ${
                          payment === pm.key
                            ? "bg-red-600/10 border-red-600"
                            : "bg-[#121212] border-white/5 hover:border-white/20"
                        }`}
                      >
                        <span className="text-2xl">{pm.icon}</span>
                        <div className="flex-1">
                          <p className="font-bold text-sm">{pm.label}</p>
                          <p className="text-xs text-gray-500">{pm.desc}</p>
                        </div>
                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                          payment === pm.key ? "border-red-600" : "border-white/20"
                        }`}>
                          {payment === pm.key && <div className="w-2.5 h-2.5 bg-red-600 rounded-full"></div>}
                        </div>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Right: Order Summary */}
                <div className="w-full lg:w-[400px] flex-shrink-0">
                  <div className="bg-[#121212] border border-white/5 rounded-2xl p-6 sticky top-6">
                    <h2 className="text-xl font-black mb-6">สรุปคำสั่งซื้อ</h2>

                    <div className="space-y-4 mb-6">
                      {orderItems.map((item, i) => (
                        <div key={i} className="flex items-center gap-4">
                          <img src={item.image} alt={item.name} className="w-14 h-14 rounded-xl object-cover flex-shrink-0" />
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-bold truncate">{item.name}</p>
                            <p className="text-xs text-gray-500">x{item.qty}</p>
                          </div>
                          <span className="text-sm font-bold">฿{(item.price * item.qty).toLocaleString()}</span>
                        </div>
                      ))}
                    </div>

                    <div className="border-t border-white/5 pt-4 space-y-3">
                      <div className="flex justify-between text-sm">
                        <span className="text-gray-400">ยอดรวมสินค้า</span>
                        <span className="font-bold">฿{subtotal.toLocaleString()}</span>
                      </div>
                      <div className="flex justify-between text-sm">
                        <span className="text-gray-400">ค่าจัดส่ง</span>
                        <span className={`font-bold ${shipping === 0 ? "text-green-500" : ""}`}>
                          {shipping === 0 ? "ฟรี" : `฿${shipping}`}
                        </span>
                      </div>
                      {payment === "cod" && (
                        <div className="flex justify-between text-sm">
                          <span className="text-gray-400">ค่าบริการ COD</span>
                          <span className="font-bold">฿20</span>
                        </div>
                      )}
                      <div className="border-t border-white/5 pt-4 flex justify-between">
                        <span className="font-bold text-lg">รวมทั้งสิ้น</span>
                        <span className="font-black text-2xl text-red-500">฿{(total + (payment === "cod" ? 20 : 0)).toLocaleString()}</span>
                      </div>
                    </div>

                    <button
                      onClick={() => alert("สั่งซื้อสำเร็จ! ขอบคุณที่อุดหนุน Tour Long")}
                      className="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-full font-bold text-lg mt-6 transition-transform hover:scale-105 active:scale-95"
                    >
                      ยืนยันการสั่งซื้อ
                    </button>

                    <a href="cart.html" className="block text-center text-sm text-gray-500 hover:text-white transition-colors mt-4">
                      ← กลับไปตะกร้า
                    </a>
                  </div>
                </div>
              </div>
            </section>

            <Footer />
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
