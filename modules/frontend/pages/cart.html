<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ตะกร้าสินค้า - Tour Long น้ำพริกทัวร์ลง</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ─── Navbar ─── */
      const Navbar = ({ cartCount = 0 }) => (
        <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
          <a href="../home-page/home-page.html" className="flex items-center gap-3">
            <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
            <div>
              <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
              <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
            </div>
          </a>
          <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
            <a href="../home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
            <a href="products.html" className="hover:text-red-500 transition-colors">สินค้า</a>
            <a href="about.html" className="hover:text-red-500 transition-colors">เกี่ยวกับเรา</a>
            <a href="contact.html" className="hover:text-red-500 transition-colors">ติดต่อเรา</a>
          </nav>
          <div className="flex items-center gap-4">
            <a href="cart.html" className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
              🛒
              {cartCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{cartCount}</span>
              )}
            </a>
            <button className="lg:hidden text-white text-2xl">☰</button>
          </div>
        </header>
      );

      /* ─── Footer ─── */
      const Footer = () => (
        <footer className="bg-black py-16 border-t border-white/5">
          <div className="container mx-auto px-6 text-center">
            <div className="flex justify-center items-center gap-3 mb-6">
              <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
              <span className="font-black text-lg">TOUR LONG</span>
            </div>
            <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
              น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
            </p>
            <div className="flex justify-center gap-6 text-gray-400 text-sm">
              <a href="#" className="hover:text-white transition-colors">Facebook</a>
              <a href="#" className="hover:text-white transition-colors">Instagram</a>
              <a href="#" className="hover:text-white transition-colors">TikTok</a>
              <a href="#" className="hover:text-white transition-colors">Shopee</a>
              <a href="#" className="hover:text-white transition-colors">Lazada</a>
            </div>
            <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
              © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
            </div>
          </div>
        </footer>
      );

      /* ─── App ─── */
      const App = () => {
        const [items, setItems] = useState([
          { id: 1, name: "น้ำพริกน้ำย้อย เห็ดกรอบ", nameEn: "Numprik Numyoi Oyster Mushroom", price: 69, qty: 2, image: "/assets/images/green-pack.jpg" },
          { id: 2, name: "น้ำพริกน้ำย้อย เผ็ดจี๊ด", nameEn: "Numprik Numyoi Spicy", price: 69, qty: 1, image: "/assets/images/red-pack.jpg" },
          { id: 4, name: "เซ็ต 3 ซอง สุดคุ้ม", nameEn: "Value Pack 3 Sachets", price: 198, qty: 1, image: "/assets/images/promo-pack.png" },
        ]);
        const [coupon, setCoupon] = useState("");
        const [couponApplied, setCouponApplied] = useState(false);

        const updateQty = (id, delta) => {
          setItems(prev => prev.map(item => item.id === id ? { ...item, qty: Math.max(1, item.qty + delta) } : item));
        };

        const removeItem = (id) => {
          setItems(prev => prev.filter(item => item.id !== id));
        };

        const subtotal = items.reduce((sum, item) => sum + item.price * item.qty, 0);
        const shipping = subtotal >= 500 ? 0 : 50;
        const discount = couponApplied ? 20 : 0;
        const total = subtotal + shipping - discount;
        const totalQty = items.reduce((sum, item) => sum + item.qty, 0);

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600">
            <Navbar cartCount={totalQty} />

            <section className="px-6 md:px-16 py-12">
              <div className="max-w-6xl mx-auto">
                <h1 className="text-4xl md:text-5xl font-black mb-2">ตะกร้าสินค้า</h1>
                <p className="text-gray-500 text-sm mb-10">{items.length} รายการในตะกร้า</p>

                {items.length === 0 ? (
                  <div className="text-center py-24">
                    <p className="text-6xl mb-6">🛒</p>
                    <p className="text-gray-500 text-lg mb-8">ตะกร้าของคุณยังว่างอยู่</p>
                    <a href="products.html" className="bg-red-600 hover:bg-red-700 text-white px-8 py-4 rounded-full font-bold inline-block transition-transform hover:scale-105">เลือกซื้อสินค้า</a>
                  </div>
                ) : (
                  <div className="flex flex-col lg:flex-row gap-10">
                    {/* Cart Items */}
                    <div className="flex-1 space-y-4">
                      {items.map(item => (
                        <div key={item.id} className="bg-[#121212] border border-white/5 rounded-2xl p-4 md:p-6 flex flex-col md:flex-row items-center gap-6">
                          <img src={item.image} alt={item.name} className="w-24 h-24 rounded-xl object-cover flex-shrink-0" />
                          <div className="flex-1 text-center md:text-left">
                            <p className="text-[10px] text-gray-600 uppercase tracking-wider">{item.nameEn}</p>
                            <h3 className="font-bold text-lg">{item.name}</h3>
                            <p className="text-red-500 font-bold mt-1">฿{item.price}</p>
                          </div>
                          <div className="flex items-center gap-4">
                            <div className="flex items-center bg-white/5 border border-white/10 rounded-xl overflow-hidden">
                              <button onClick={() => updateQty(item.id, -1)} className="px-3 py-2 hover:bg-white/5 transition-colors font-bold">-</button>
                              <span className="px-4 py-2 font-bold min-w-[40px] text-center">{item.qty}</span>
                              <button onClick={() => updateQty(item.id, 1)} className="px-3 py-2 hover:bg-white/5 transition-colors font-bold">+</button>
                            </div>
                            <span className="font-black text-lg min-w-[80px] text-right">฿{(item.price * item.qty).toLocaleString()}</span>
                            <button onClick={() => removeItem(item.id)} className="text-gray-500 hover:text-red-500 transition-colors p-2 hover:bg-white/5 rounded-xl" title="ลบ">
                              ✕
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>

                    {/* Summary Sidebar */}
                    <div className="w-full lg:w-[380px] flex-shrink-0">
                      <div className="bg-[#121212] border border-white/5 rounded-2xl p-6 sticky top-6">
                        <h2 className="text-xl font-black mb-6">สรุปคำสั่งซื้อ</h2>

                        <div className="space-y-4 mb-6">
                          <div className="flex justify-between text-sm">
                            <span className="text-gray-400">ยอดรวมสินค้า</span>
                            <span className="font-bold">฿{subtotal.toLocaleString()}</span>
                          </div>
                          <div className="flex justify-between text-sm">
                            <span className="text-gray-400">ค่าจัดส่ง</span>
                            <span className={`font-bold ${shipping === 0 ? "text-green-500" : ""}`}>
                              {shipping === 0 ? "ฟรี" : `฿${shipping}`}
                            </span>
                          </div>
                          {shipping > 0 && (
                            <p className="text-[10px] text-gray-600">สั่งครบ ฿500 จัดส่งฟรี (ยังขาดอีก ฿{500 - subtotal})</p>
                          )}
                          {couponApplied && (
                            <div className="flex justify-between text-sm">
                              <span className="text-gray-400">ส่วนลดคูปอง</span>
                              <span className="font-bold text-green-500">-฿{discount}</span>
                            </div>
                          )}
                          <div className="border-t border-white/5 pt-4 flex justify-between">
                            <span className="font-bold text-lg">รวมทั้งสิ้น</span>
                            <span className="font-black text-2xl text-red-500">฿{total.toLocaleString()}</span>
                          </div>
                        </div>

                        {/* Coupon */}
                        <div className="flex gap-2 mb-6">
                          <input
                            type="text"
                            placeholder="รหัสคูปอง"
                            value={coupon}
                            onChange={e => setCoupon(e.target.value)}
                            className="flex-1 bg-[#0a0a0a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors"
                          />
                          <button
                            onClick={() => { if (coupon.trim()) setCouponApplied(true); }}
                            className="bg-white/5 hover:bg-white/10 border border-white/10 px-5 py-3 rounded-xl font-bold text-sm transition-colors"
                          >
                            ใช้
                          </button>
                        </div>

                        <a href="checkout.html" className="block w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-full font-bold text-center text-lg transition-transform hover:scale-105 active:scale-95 mb-4">
                          ดำเนินการสั่งซื้อ
                        </a>

                        <a href="products.html" className="block text-center text-sm text-gray-500 hover:text-white transition-colors">
                          ← เลือกซื้อสินค้าต่อ
                        </a>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>

            <Footer />
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
