<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>เข้าสู่ระบบ - Tour Long</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [activeTab, setActiveTab] = useState("login");
        const [loginForm, setLoginForm] = useState({ email: "", password: "" });
        const [registerForm, setRegisterForm] = useState({
          fullName: "",
          email: "",
          phone: "",
          password: "",
          confirmPassword: "",
        });

        const handleLoginSubmit = (e) => {
          e.preventDefault();
          alert("เข้าสู่ระบบสำเร็จ (demo)");
        };

        const handleRegisterSubmit = (e) => {
          e.preventDefault();
          if (registerForm.password !== registerForm.confirmPassword) {
            alert("รหัสผ่านไม่ตรงกัน");
            return;
          }
          alert("สมัครสมาชิกสำเร็จ (demo)");
        };

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600 flex flex-col">
            {/* Background effects */}
            <div className="fixed inset-0 pointer-events-none opacity-30">
              <div className="absolute top-0 left-1/4 w-2 h-2 bg-orange-500 rounded-full blur-sm animate-pulse" style={{ animationDuration: "3s" }}></div>
              <div className="absolute top-1/3 right-1/4 w-1 h-1 bg-red-600 rounded-full blur-sm animate-ping" style={{ animationDuration: "4s" }}></div>
              <div className="absolute bottom-1/4 left-1/2 w-2 h-2 bg-yellow-500 rounded-full blur-md animate-bounce" style={{ animationDuration: "5s" }}></div>
            </div>

            {/* Minimal Navbar — logo only */}
            <header className="relative z-50 flex items-center justify-center px-6 py-6 bg-transparent">
              <a href="/modules/frontend/home-page/home-page.html" className="flex items-center gap-3">
                <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">
                  TL
                </div>
                <div>
                  <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
                  <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
                </div>
              </a>
            </header>

            {/* Centered Card */}
            <div className="flex-1 flex items-center justify-center px-4 pb-16">
              <div className="w-full max-w-md bg-[#121212] border border-white/5 rounded-3xl p-8 md:p-10 relative z-10">
                {/* Tabs */}
                <div className="flex bg-white/5 p-1.5 rounded-2xl mb-8">
                  <button
                    onClick={() => setActiveTab("login")}
                    className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${
                      activeTab === "login"
                        ? "bg-red-600 text-white shadow-lg shadow-red-900/30"
                        : "text-gray-500 hover:text-white"
                    }`}
                  >
                    เข้าสู่ระบบ
                  </button>
                  <button
                    onClick={() => setActiveTab("register")}
                    className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${
                      activeTab === "register"
                        ? "bg-red-600 text-white shadow-lg shadow-red-900/30"
                        : "text-gray-500 hover:text-white"
                    }`}
                  >
                    สมัครสมาชิก
                  </button>
                </div>

                {/* Login Form */}
                {activeTab === "login" && (
                  <form onSubmit={handleLoginSubmit} className="space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">อีเมล</label>
                      <input
                        type="email"
                        value={loginForm.email}
                        onChange={(e) => setLoginForm({ ...loginForm, email: e.target.value })}
                        placeholder="your@email.com"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">รหัสผ่าน</label>
                      <input
                        type="password"
                        value={loginForm.password}
                        onChange={(e) => setLoginForm({ ...loginForm, password: e.target.value })}
                        placeholder="••••••••"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div className="flex justify-end">
                      <a href="#" className="text-xs text-red-500 hover:text-red-400 transition-colors">ลืมรหัสผ่าน?</a>
                    </div>
                    <button
                      type="submit"
                      className="w-full bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-xl font-bold text-sm transition-transform hover:scale-[1.02] active:scale-95"
                    >
                      เข้าสู่ระบบ
                    </button>
                  </form>
                )}

                {/* Register Form */}
                {activeTab === "register" && (
                  <form onSubmit={handleRegisterSubmit} className="space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">ชื่อ-นามสกุล</label>
                      <input
                        type="text"
                        value={registerForm.fullName}
                        onChange={(e) => setRegisterForm({ ...registerForm, fullName: e.target.value })}
                        placeholder="สมชาย ใจดี"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">อีเมล</label>
                      <input
                        type="email"
                        value={registerForm.email}
                        onChange={(e) => setRegisterForm({ ...registerForm, email: e.target.value })}
                        placeholder="your@email.com"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">เบอร์โทร</label>
                      <input
                        type="tel"
                        value={registerForm.phone}
                        onChange={(e) => setRegisterForm({ ...registerForm, phone: e.target.value })}
                        placeholder="081-234-5678"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">รหัสผ่าน</label>
                      <input
                        type="password"
                        value={registerForm.password}
                        onChange={(e) => setRegisterForm({ ...registerForm, password: e.target.value })}
                        placeholder="••••••••"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-400 mb-2">ยืนยันรหัสผ่าน</label>
                      <input
                        type="password"
                        value={registerForm.confirmPassword}
                        onChange={(e) => setRegisterForm({ ...registerForm, confirmPassword: e.target.value })}
                        placeholder="••••••••"
                        className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors"
                        required
                      />
                    </div>
                    <button
                      type="submit"
                      className="w-full bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-xl font-bold text-sm transition-transform hover:scale-[1.02] active:scale-95"
                    >
                      สมัครสมาชิก
                    </button>
                  </form>
                )}

                {/* Divider */}
                <div className="flex items-center gap-4 my-8">
                  <div className="flex-1 h-px bg-white/10"></div>
                  <span className="text-xs text-gray-600 uppercase tracking-widest">หรือ</span>
                  <div className="flex-1 h-px bg-white/10"></div>
                </div>

                {/* Social Login */}
                <div className="space-y-3">
                  <button className="w-full flex items-center justify-center gap-3 bg-transparent border border-white/10 hover:border-blue-500/50 hover:bg-blue-500/5 text-white py-3.5 rounded-xl font-medium text-sm transition-all">
                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    เข้าสู่ระบบด้วย Facebook
                  </button>
                  <button className="w-full flex items-center justify-center gap-3 bg-transparent border border-white/10 hover:border-red-500/50 hover:bg-red-500/5 text-white py-3.5 rounded-xl font-medium text-sm transition-all">
                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    เข้าสู่ระบบด้วย Google
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
