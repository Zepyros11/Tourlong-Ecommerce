<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สินค้าทั้งหมด - Tour Long น้ำพริกทัวร์ลง</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      /* ─── Navbar ─── */
      const Navbar = ({ cartCount = 0 }) => (
        <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
          <a href="../home-page/home-page.html" className="flex items-center gap-3">
            <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
            <div>
              <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
              <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
            </div>
          </a>
          <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
            <a href="../home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
            <a href="products.html" className="text-white hover:text-red-500 transition-colors">สินค้า</a>
            <a href="about.html" className="hover:text-red-500 transition-colors">เกี่ยวกับเรา</a>
            <a href="contact.html" className="hover:text-red-500 transition-colors">ติดต่อเรา</a>
          </nav>
          <div className="flex items-center gap-4">
            <a href="cart.html" className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
              🛒
              {cartCount > 0 && (
                <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">{cartCount}</span>
              )}
            </a>
            <button className="lg:hidden text-white text-2xl">☰</button>
          </div>
        </header>
      );

      /* ─── Footer ─── */
      const Footer = () => (
        <footer className="bg-black py-16 border-t border-white/5">
          <div className="container mx-auto px-6 text-center">
            <div className="flex justify-center items-center gap-3 mb-6">
              <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
              <span className="font-black text-lg">TOUR LONG</span>
            </div>
            <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
              น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
            </p>
            <div className="flex justify-center gap-6 text-gray-400 text-sm">
              <a href="#" className="hover:text-white transition-colors">Facebook</a>
              <a href="#" className="hover:text-white transition-colors">Instagram</a>
              <a href="#" className="hover:text-white transition-colors">TikTok</a>
              <a href="#" className="hover:text-white transition-colors">Shopee</a>
              <a href="#" className="hover:text-white transition-colors">Lazada</a>
            </div>
            <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
              © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
            </div>
          </div>
        </footer>
      );

      /* ─── App ─── */
      const App = () => {
        const [activeTab, setActiveTab] = useState("all");
        const [search, setSearch] = useState("");
        const [cartCount, setCartCount] = useState(0);

        const categories = [
          { key: "all", name: "ทั้งหมด" },
          { key: "numprik", name: "น้ำพริก" },
          { key: "set", name: "เซ็ตสุดคุ้ม" },
          { key: "snack", name: "ของทานเล่น" },
        ];

        const products = [
          { id: 1, name: "น้ำพริกน้ำย้อย เห็ดกรอบ", nameEn: "Numprik Numyoi Oyster Mushroom", desc: "ไม่ใส่ผงชูรส • สูตรหวานน้อย • 50 กรัม", price: 69, image: "/assets/images/green-pack.jpg", category: "numprik", badge: "ขายดี" },
          { id: 2, name: "น้ำพริกน้ำย้อย เผ็ดจี๊ด", nameEn: "Numprik Numyoi Spicy", desc: "เผ็ดจี๊ดทุกคำ • เบ๊กกี้ ศรีธัญญา • 50 กรัม", price: 69, image: "/assets/images/red-pack.jpg", category: "numprik", badge: "เผ็ด" },
          { id: 3, name: "น้ำพริกน้ำย้อย อกไก่แซ่บ", nameEn: "Numprik Numyoi Chicken Breast", desc: "ไม่ใส่ผงชูรส • สูตรหวานน้อย • 50 กรัม", price: 69, image: "/assets/images/orange-pack.jpg", category: "numprik", badge: "ใหม่" },
          { id: 4, name: "เซ็ต 3 ซอง สุดคุ้ม", nameEn: "Value Pack 3 Sachets", desc: "รวม 3 รสชาติ • ประหยัดกว่า • 150 กรัม", price: 198, originalPrice: 207, image: "/assets/images/promo-pack.png", category: "set", badge: "คุ้มสุด" },
          { id: 5, name: "ข้าวเกรียบพริกทัวร์ลง", nameEn: "Tour Long Chilli Crackers", desc: "กรอบ อร่อย เผ็ดนิดๆ • 80 กรัม", price: 45, image: "/assets/images/green-pack.jpg", category: "snack", badge: "" },
          { id: 6, name: "น้ำพริกน้ำย้อย ปลาทู", nameEn: "Numprik Numyoi Mackerel", desc: "สูตรใหม่ล่าสุด • รสชาติเข้มข้น • 50 กรัม", price: 75, image: "/assets/images/red-pack.jpg", category: "numprik", badge: "ใหม่" },
        ];

        const filtered = products
          .filter(p => activeTab === "all" || p.category === activeTab)
          .filter(p => search === "" || p.name.includes(search) || p.nameEn.toLowerCase().includes(search.toLowerCase()));

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600">
            <Navbar cartCount={cartCount} />

            {/* Hero Banner */}
            <section className="relative px-6 md:px-16 py-20 bg-gradient-to-b from-red-600/10 to-transparent text-center">
              <h1 className="text-5xl md:text-6xl font-black uppercase tracking-tighter mb-4">สินค้าทั้งหมด</h1>
              <p className="text-gray-400 text-sm md:text-base max-w-lg mx-auto">เลือกสรรความอร่อยจากน้ำพริกทัวร์ลง สูตรหวานน้อย ไม่ใส่ผงชูรส</p>
            </section>

            {/* Filters */}
            <section className="px-6 md:px-16 pb-6">
              <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-center gap-6">
                {/* Category Tabs */}
                <div className="flex flex-wrap justify-center gap-3 bg-white/5 p-2 rounded-2xl border border-white/5">
                  {categories.map(cat => (
                    <button
                      key={cat.key}
                      onClick={() => setActiveTab(cat.key)}
                      className={`px-6 py-3 rounded-xl font-bold transition-all ${activeTab === cat.key ? "bg-red-600 text-white shadow-lg shadow-red-900/30" : "text-gray-500 hover:text-white"}`}
                    >
                      {cat.name}
                    </button>
                  ))}
                </div>

                {/* Search */}
                <div className="relative flex-1 w-full md:w-auto">
                  <input
                    type="text"
                    placeholder="ค้นหาสินค้า..."
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    className="w-full bg-[#121212] border border-white/10 rounded-xl px-5 py-3 text-white text-sm placeholder-gray-500 focus:outline-none focus:border-red-600 transition-colors"
                  />
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">🔍</span>
                </div>
              </div>
            </section>

            {/* Product Grid */}
            <section className="px-6 md:px-16 py-12 bg-[#080808]">
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mx-auto max-w-[900px]">
                {filtered.map(item => (
                  <a key={item.id} href="product-detail.html" className="bg-[#121212] border border-white/5 rounded-3xl p-5 group hover:border-red-600/50 transition-all hover:-translate-y-2 block no-underline text-white">
                    <div className="relative mb-4">
                      {item.badge && (
                        <span className="absolute top-2 left-2 z-10 bg-red-600 text-white text-[10px] font-bold px-3 py-1 rounded-full">{item.badge}</span>
                      )}
                      <img src={item.image} alt={item.name} className="w-full aspect-square object-cover rounded-2xl group-hover:scale-105 transition-transform duration-500" />
                    </div>
                    <p className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">{item.nameEn}</p>
                    <h3 className="text-base font-bold mb-1 group-hover:text-red-500 transition-colors">{item.name}</h3>
                    <p className="text-xs text-gray-500 mb-4 leading-relaxed">{item.desc}</p>
                    <div className="flex items-center justify-between">
                      <div className="flex items-baseline gap-2">
                        <span className="text-lg font-black text-white">฿{item.price}</span>
                        {item.originalPrice && <span className="text-xs text-gray-600 line-through">฿{item.originalPrice}</span>}
                      </div>
                      <button
                        onClick={e => { e.preventDefault(); setCartCount(c => c + 1); }}
                        className="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl transition-colors text-white text-sm font-bold flex items-center gap-2"
                      >
                        🛒 เพิ่ม
                      </button>
                    </div>
                  </a>
                ))}
              </div>

              {filtered.length === 0 && (
                <p className="text-center text-gray-500 py-20">ไม่พบสินค้าที่ค้นหา</p>
              )}
            </section>

            <Footer />
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
