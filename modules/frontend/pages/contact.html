<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ติดต่อเรา - Tour Long</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [form, setForm] = useState({
          name: "",
          email: "",
          subject: "",
          message: "",
        });

        const handleChange = (field, value) => {
          setForm(prev => ({ ...prev, [field]: value }));
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          alert("ส่งข้อความเรียบร้อยแล้ว! เราจะติดต่อกลับโดยเร็วที่สุด");
        };

        const contactInfo = [
          { icon: "📞", title: "โทรศัพท์", detail: "081-234-5678", sub: "จันทร์-ศุกร์ 9:00-18:00" },
          { icon: "💬", title: "Line Official", detail: "@tourlong", sub: "ตอบแชททุกวัน" },
          { icon: "📧", title: "Email", detail: "info@tourlong.com", sub: "ตอบกลับภายใน 24 ชม." },
          { icon: "📍", title: "ที่อยู่", detail: "123/45 ถ.พระราม 9 แขวงห้วยขวาง", sub: "เขตห้วยขวาง กรุงเทพฯ 10310" },
        ];

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans">
            {/* Navbar */}
            <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
                <div>
                  <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
                  <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
                </div>
              </div>
              <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
                <a href="../home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
                <a href="products.html" className="hover:text-red-500 transition-colors">สินค้า</a>
                <a href="about.html" className="hover:text-red-500 transition-colors">เกี่ยวกับเรา</a>
                <a href="contact.html" className="text-white hover:text-red-500 transition-colors">ติดต่อเรา</a>
              </nav>
              <div className="flex items-center gap-4">
                <button className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
                  🛒
                </button>
                <button className="lg:hidden text-white text-2xl">☰</button>
              </div>
            </header>

            {/* Hero */}
            <section className="relative px-6 md:px-16 py-24 text-center">
              <div className="absolute inset-0 bg-gradient-to-b from-red-600/5 to-transparent pointer-events-none"></div>
              <div className="relative z-10">
                <span className="text-red-500 font-bold uppercase tracking-widest text-sm mb-4 block">Contact Us</span>
                <h1 className="text-5xl md:text-6xl font-black mb-4">ติดต่อเรา</h1>
                <p className="text-gray-400 text-sm max-w-lg mx-auto">สนใจสั่งซื้อ เป็นตัวแทนจำหน่าย หรือมีข้อสงสัย ติดต่อเราได้เลย</p>
              </div>
            </section>

            {/* Contact Info Cards */}
            <section className="px-6 md:px-16 pb-16">
              <div className="max-w-5xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                {contactInfo.map((c, i) => (
                  <div key={i} className="bg-[#121212] border border-white/5 rounded-3xl p-6 text-center hover:border-red-600/30 transition-all group">
                    <div className="w-14 h-14 bg-red-600/10 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 group-hover:scale-110 transition-transform">
                      {c.icon}
                    </div>
                    <p className="text-sm font-bold mb-1">{c.title}</p>
                    <p className="text-red-500 text-sm font-bold mb-1">{c.detail}</p>
                    <p className="text-[11px] text-gray-500">{c.sub}</p>
                  </div>
                ))}
              </div>
            </section>

            {/* Contact Form + Hours */}
            <section className="px-6 md:px-16 py-24 bg-[#080808]">
              <div className="max-w-5xl mx-auto flex flex-col md:flex-row gap-8">
                {/* Form */}
                <div className="w-full md:w-2/3 bg-[#121212] border border-white/5 rounded-3xl p-6 md:p-8">
                  <h2 className="text-2xl font-black mb-6">ส่งข้อความถึงเรา</h2>
                  <form onSubmit={handleSubmit} className="space-y-5">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                      <div>
                        <label className="block text-xs text-gray-500 font-medium mb-2">ชื่อ</label>
                        <input
                          type="text"
                          value={form.name}
                          onChange={(e) => handleChange("name", e.target.value)}
                          placeholder="กรอกชื่อของคุณ"
                          className="w-full bg-[#121212] border border-white/10 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-red-600 transition-colors"
                        />
                      </div>
                      <div>
                        <label className="block text-xs text-gray-500 font-medium mb-2">อีเมล</label>
                        <input
                          type="email"
                          value={form.email}
                          onChange={(e) => handleChange("email", e.target.value)}
                          placeholder="email@example.com"
                          className="w-full bg-[#121212] border border-white/10 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-red-600 transition-colors"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs text-gray-500 font-medium mb-2">หัวข้อ</label>
                      <input
                        type="text"
                        value={form.subject}
                        onChange={(e) => handleChange("subject", e.target.value)}
                        placeholder="หัวข้อที่ต้องการติดต่อ"
                        className="w-full bg-[#121212] border border-white/10 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-red-600 transition-colors"
                      />
                    </div>
                    <div>
                      <label className="block text-xs text-gray-500 font-medium mb-2">ข้อความ</label>
                      <textarea
                        rows="5"
                        value={form.message}
                        onChange={(e) => handleChange("message", e.target.value)}
                        placeholder="รายละเอียดที่ต้องการแจ้ง..."
                        className="w-full bg-[#121212] border border-white/10 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-red-600 transition-colors resize-none"
                      ></textarea>
                    </div>
                    <button
                      type="submit"
                      className="bg-red-600 hover:bg-red-700 text-white px-10 py-4 rounded-full font-bold transition-transform hover:scale-105 active:scale-95"
                    >
                      ส่งข้อความ
                    </button>
                  </form>
                </div>

                {/* Business Hours + Map placeholder */}
                <div className="w-full md:w-1/3 space-y-6">
                  <div className="bg-[#121212] border border-white/5 rounded-3xl p-6 md:p-8">
                    <h3 className="text-lg font-black mb-6">เวลาทำการ</h3>
                    <div className="space-y-4">
                      <div className="flex justify-between items-center py-2 border-b border-white/5">
                        <span className="text-sm text-gray-400">จันทร์ - ศุกร์</span>
                        <span className="text-sm font-bold text-green-500">9:00 - 18:00</span>
                      </div>
                      <div className="flex justify-between items-center py-2 border-b border-white/5">
                        <span className="text-sm text-gray-400">เสาร์</span>
                        <span className="text-sm font-bold text-yellow-500">10:00 - 16:00</span>
                      </div>
                      <div className="flex justify-between items-center py-2">
                        <span className="text-sm text-gray-400">อาทิตย์</span>
                        <span className="text-sm font-bold text-red-500">ปิดทำการ</span>
                      </div>
                    </div>
                  </div>

                  <div className="bg-[#121212] border border-white/5 rounded-3xl p-6 md:p-8">
                    <h3 className="text-lg font-black mb-4">ช่องทางสั่งซื้อ</h3>
                    <div className="space-y-3">
                      <a href="#" className="flex items-center gap-3 text-sm text-gray-400 hover:text-white transition-colors">
                        <span className="w-8 h-8 bg-green-600/10 rounded-lg flex items-center justify-center text-sm">💬</span>
                        Line @tourlong
                      </a>
                      <a href="#" className="flex items-center gap-3 text-sm text-gray-400 hover:text-white transition-colors">
                        <span className="w-8 h-8 bg-blue-600/10 rounded-lg flex items-center justify-center text-sm">📘</span>
                        Facebook Page
                      </a>
                      <a href="#" className="flex items-center gap-3 text-sm text-gray-400 hover:text-white transition-colors">
                        <span className="w-8 h-8 bg-orange-600/10 rounded-lg flex items-center justify-center text-sm">🛍️</span>
                        Shopee
                      </a>
                      <a href="#" className="flex items-center gap-3 text-sm text-gray-400 hover:text-white transition-colors">
                        <span className="w-8 h-8 bg-blue-500/10 rounded-lg flex items-center justify-center text-sm">🛒</span>
                        Lazada
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            {/* Footer */}
            <footer className="bg-black py-16 border-t border-white/5">
              <div className="container mx-auto px-6 text-center">
                <div className="flex justify-center items-center gap-3 mb-6">
                  <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">TL</div>
                  <span className="font-black text-lg">TOUR LONG</span>
                </div>
                <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
                  น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส
                  ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
                </p>
                <div className="flex justify-center gap-6 text-gray-400 text-sm">
                  <a href="#" className="hover:text-white transition-colors">Facebook</a>
                  <a href="#" className="hover:text-white transition-colors">Instagram</a>
                  <a href="#" className="hover:text-white transition-colors">TikTok</a>
                  <a href="#" className="hover:text-white transition-colors">Shopee</a>
                  <a href="#" className="hover:text-white transition-colors">Lazada</a>
                </div>
                <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
                  &copy; 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
                </div>
              </div>
            </footer>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
