<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>โปรโมชั่น - Tour Long</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [cartItems, setCartItems] = useState([]);
        const [couponCode, setCouponCode] = useState("");
        const [couponMessage, setCouponMessage] = useState("");

        const cartTotal = cartItems.reduce((sum, item) => sum + item.price, 0);

        const promotions = [
          {
            id: 1,
            title: "เซ็ต 3 ซอง 198.-",
            subtitle: "ปกติ 207.-",
            description: "รวม 3 รสชาติยอดนิยม น้ำพริกน้ำย้อย เห็ดกรอบ, เผ็ดจี๊ด และอกไก่แซ่บ ในราคาสุดคุ้ม",
            badge: "คุ้มสุด",
            validity: "วันนี้ - 30 เม.ย. 2026",
            gradient: "from-red-600 via-red-700 to-orange-600",
            icon: "🔥",
          },
          {
            id: 2,
            title: "ซื้อ 2 แถม 1",
            subtitle: "น้ำพริกน้ำย้อยทุกรสชาติ",
            description: "ซื้อน้ำพริกน้ำย้อยรสชาติใดก็ได้ 2 ซอง รับฟรีอีก 1 ซอง (รสชาติใดก็ได้)",
            badge: "สุดคุ้ม",
            validity: "วันนี้ - 30 เม.ย. 2026",
            gradient: "from-orange-500 via-amber-600 to-yellow-500",
            icon: "🎁",
          },
          {
            id: 3,
            title: "ส่งฟรี",
            subtitle: "สั่งครบ 500.- ส่งฟรีทั่วไทย",
            description: "สั่งสินค้าครบ 500 บาทขึ้นไป รับสิทธิ์ส่งฟรีทั่วประเทศ ไม่มีขั้นต่ำน้ำหนัก",
            badge: "ส่งฟรี",
            validity: "ตลอดเดือน เม.ย. 2026",
            gradient: "from-emerald-500 via-green-600 to-teal-500",
            icon: "🚚",
          },
          {
            id: 4,
            title: "สมาชิกใหม่ลด 10%",
            subtitle: "ใช้โค้ด WELCOME10",
            description: "สมัครสมาชิกวันนี้ รับส่วนลด 10% สำหรับการสั่งซื้อครั้งแรก ใช้ได้กับสินค้าทุกรายการ",
            badge: "สมาชิกใหม่",
            validity: "สำหรับสมาชิกใหม่เท่านั้น",
            gradient: "from-violet-500 via-purple-600 to-fuchsia-500",
            icon: "🎉",
          },
        ];

        const handleCoupon = () => {
          if (!couponCode.trim()) {
            setCouponMessage("กรุณากรอกรหัสคูปอง");
            return;
          }
          if (couponCode.toUpperCase() === "WELCOME10") {
            setCouponMessage("ใช้คูปองสำเร็จ! ลด 10% สำหรับการสั่งซื้อครั้งแรก");
          } else {
            setCouponMessage("รหัสคูปองไม่ถูกต้องหรือหมดอายุแล้ว");
          }
        };

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600 overflow-x-hidden">
            {/* Background effects */}
            <div className="fixed inset-0 pointer-events-none opacity-30">
              <div className="absolute top-0 left-1/4 w-2 h-2 bg-orange-500 rounded-full blur-sm animate-pulse" style={{ animationDuration: "3s" }}></div>
              <div className="absolute top-1/3 right-1/4 w-1 h-1 bg-red-600 rounded-full blur-sm animate-ping" style={{ animationDuration: "4s" }}></div>
              <div className="absolute bottom-1/4 left-1/2 w-2 h-2 bg-yellow-500 rounded-full blur-md animate-bounce" style={{ animationDuration: "5s" }}></div>
            </div>

            {/* Navbar */}
            <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">
                  TL
                </div>
                <div>
                  <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
                  <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
                </div>
              </div>

              <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
                <a href="/modules/frontend/home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
                <a href="#" className="hover:text-red-500 transition-colors">สินค้า</a>
                <a href="#" className="text-white hover:text-red-500 transition-colors">โปรโมชั่น</a>
                <a href="#" className="hover:text-red-500 transition-colors">สินค้าที่ถูกใจ</a>
              </nav>

              <div className="flex items-center gap-4">
                <button className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
                  🛒
                  {cartItems.length > 0 && (
                    <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">
                      {cartItems.length}
                    </span>
                  )}
                </button>
                {cartTotal > 0 && (
                  <span className="hidden md:block text-sm font-bold text-red-500">฿{cartTotal.toLocaleString()}</span>
                )}
                <button className="lg:hidden text-white text-2xl">☰</button>
              </div>
            </header>

            {/* Hero Banner */}
            <section className="relative px-6 md:px-16 py-20 overflow-hidden">
              <div className="absolute inset-0 bg-gradient-to-r from-red-600/20 via-orange-600/10 to-transparent pointer-events-none"></div>
              <div className="absolute top-1/2 right-0 -translate-y-1/2 w-96 h-96 bg-red-600/10 blur-[150px] rounded-full pointer-events-none"></div>
              <div className="max-w-5xl mx-auto relative z-10 text-center">
                <span className="inline-block bg-red-600 text-white text-xs font-bold px-4 py-1.5 rounded-full mb-6 uppercase tracking-widest">
                  Special Offers
                </span>
                <h1 className="text-4xl md:text-6xl font-black uppercase tracking-tighter mb-4 leading-tight">
                  โปรโมชั่นพิเศษ
                  <br />
                  <span className="text-red-500">ประจำเดือน เม.ย. 2026</span>
                </h1>
                <p className="text-gray-400 text-sm md:text-base max-w-lg mx-auto">
                  รวมดีลสุดคุ้มจากน้ำพริกทัวร์ลง ช้อปเลยก่อนหมดเขต!
                </p>
              </div>
            </section>

            {/* Promotion Cards */}
            <section className="px-6 md:px-16 pb-20">
              <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                {promotions.map((promo) => (
                  <div
                    key={promo.id}
                    className="relative rounded-3xl overflow-hidden group hover:-translate-y-2 transition-all duration-300"
                  >
                    <div className={`absolute inset-0 bg-gradient-to-br ${promo.gradient} opacity-90`}></div>
                    <div className="absolute inset-0 bg-black/20"></div>
                    <div className="relative z-10 p-8">
                      <div className="flex items-center justify-between mb-4">
                        <span className="text-4xl">{promo.icon}</span>
                        <span className="bg-white/20 backdrop-blur-sm text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                          {promo.badge}
                        </span>
                      </div>
                      <h3 className="text-2xl md:text-3xl font-black mb-1">{promo.title}</h3>
                      <p className="text-white/80 font-medium text-sm mb-3">{promo.subtitle}</p>
                      <p className="text-white/60 text-sm leading-relaxed mb-6">{promo.description}</p>
                      <div className="flex items-center justify-between flex-wrap gap-4">
                        <span className="text-white/50 text-xs">
                          {promo.validity}
                        </span>
                        <a
                          href="/modules/frontend/home-page/home-page.html#products"
                          className="bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white px-6 py-2.5 rounded-xl font-bold text-sm transition-all hover:scale-105 active:scale-95"
                        >
                          สั่งซื้อเลย
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* Coupon Code Section */}
            <section className="px-6 md:px-16 pb-24">
              <div className="max-w-xl mx-auto bg-[#121212] border border-white/5 rounded-3xl p-8 md:p-10 text-center">
                <div className="text-3xl mb-4">🏷️</div>
                <h2 className="text-2xl font-black mb-2">มีคูปองส่วนลด?</h2>
                <p className="text-gray-500 text-sm mb-8">กรอกรหัสคูปองเพื่อรับส่วนลดเพิ่มเติม</p>
                <div className="flex gap-3">
                  <input
                    type="text"
                    value={couponCode}
                    onChange={(e) => { setCouponCode(e.target.value); setCouponMessage(""); }}
                    placeholder="กรอกรหัสคูปอง"
                    className="flex-1 bg-white/5 border border-white/10 rounded-xl px-5 py-3.5 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-colors uppercase tracking-wider"
                  />
                  <button
                    onClick={handleCoupon}
                    className="bg-red-600 hover:bg-red-700 text-white px-6 py-3.5 rounded-xl font-bold text-sm transition-transform hover:scale-105 active:scale-95 whitespace-nowrap"
                  >
                    ใช้คูปอง
                  </button>
                </div>
                {couponMessage && (
                  <p className={`mt-4 text-sm font-medium ${
                    couponMessage.includes("สำเร็จ") ? "text-green-400" : "text-red-400"
                  }`}>
                    {couponMessage}
                  </p>
                )}
              </div>
            </section>

            {/* Footer */}
            <footer className="bg-black py-16 border-t border-white/5">
              <div className="container mx-auto px-6 text-center">
                <div className="flex justify-center items-center gap-3 mb-6">
                  <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">
                    TL
                  </div>
                  <span className="font-black text-lg">TOUR LONG</span>
                </div>
                <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
                  น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส
                  ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
                </p>
                <div className="flex justify-center gap-6 text-gray-400 text-sm">
                  <a href="#" className="hover:text-white transition-colors">Facebook</a>
                  <a href="#" className="hover:text-white transition-colors">Instagram</a>
                  <a href="#" className="hover:text-white transition-colors">TikTok</a>
                  <a href="#" className="hover:text-white transition-colors">Shopee</a>
                  <a href="#" className="hover:text-white transition-colors">Lazada</a>
                </div>
                <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
                  © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
                </div>
              </div>
            </footer>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
