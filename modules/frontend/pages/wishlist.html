<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สินค้าที่ถูกใจ - Tour Long</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body { margin: 0; font-family: "Plus Jakarta Sans", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [wishlistItems, setWishlistItems] = useState([
          {
            id: 1,
            name: "น้ำพริกน้ำย้อย เห็ดกรอบ",
            nameEn: "Numprik Numyoi Oyster Mushroom",
            desc: "ไม่ใส่ผงชูรส • สูตรหวานน้อย • 50 กรัม",
            price: 69,
            image: "/assets/images/green-pack.jpg",
          },
          {
            id: 2,
            name: "น้ำพริกน้ำย้อย เผ็ดจี๊ด",
            nameEn: "Numprik Numyoi Spicy",
            desc: "เผ็ดจี๊ดทุกคำ • เบ๊กกี้ ศรีธัญญา • 50 กรัม",
            price: 69,
            image: "/assets/images/red-pack.jpg",
          },
          {
            id: 3,
            name: "น้ำพริกน้ำย้อย อกไก่แซ่บ",
            nameEn: "Numprik Numyoi Chicken Breast",
            desc: "ไม่ใส่ผงชูรส • สูตรหวานน้อย • 50 กรัม",
            price: 69,
            image: "/assets/images/orange-pack.jpg",
          },
          {
            id: 4,
            name: "เซ็ต 3 ซอง สุดคุ้ม",
            nameEn: "Value Pack 3 Sachets",
            desc: "รวม 3 รสชาติ • ประหยัดกว่า • 150 กรัม",
            price: 198,
            originalPrice: 207,
            image: "/assets/images/promo-pack.png",
          },
        ]);

        const [cartItems, setCartItems] = useState([]);

        const removeFromWishlist = (id) => {
          setWishlistItems((prev) => prev.filter((item) => item.id !== id));
        };

        const addToCart = (product) => {
          setCartItems((prev) => [...prev, product]);
        };

        const cartTotal = cartItems.reduce((sum, item) => sum + item.price, 0);

        return (
          <div className="min-h-screen bg-[#0a0a0a] text-white font-sans selection:bg-red-600 overflow-x-hidden">
            {/* Background effects */}
            <div className="fixed inset-0 pointer-events-none opacity-30">
              <div className="absolute top-0 left-1/4 w-2 h-2 bg-orange-500 rounded-full blur-sm animate-pulse" style={{ animationDuration: "3s" }}></div>
              <div className="absolute top-1/3 right-1/4 w-1 h-1 bg-red-600 rounded-full blur-sm animate-ping" style={{ animationDuration: "4s" }}></div>
              <div className="absolute bottom-1/4 left-1/2 w-2 h-2 bg-yellow-500 rounded-full blur-md animate-bounce" style={{ animationDuration: "5s" }}></div>
            </div>

            {/* Navbar */}
            <header className="relative z-50 flex items-center justify-between px-6 py-4 md:px-16 border-b border-white/5 bg-black/20 backdrop-blur-md">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">
                  TL
                </div>
                <div>
                  <span className="font-black tracking-tighter text-lg block leading-none">TOUR LONG</span>
                  <span className="text-[9px] text-gray-500 tracking-widest uppercase">น้ำพริกทัวร์ลง</span>
                </div>
              </div>

              <nav className="hidden lg:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-gray-400">
                <a href="/modules/frontend/home-page/home-page.html" className="hover:text-red-500 transition-colors">หน้าแรก</a>
                <a href="#" className="hover:text-red-500 transition-colors">สินค้า</a>
                <a href="#" className="hover:text-red-500 transition-colors">โปรโมชั่น</a>
                <a href="#" className="text-white hover:text-red-500 transition-colors">สินค้าที่ถูกใจ</a>
              </nav>

              <div className="flex items-center gap-4">
                <button className="relative bg-white/5 hover:bg-white/10 p-3 rounded-xl border border-white/10 transition-colors">
                  🛒
                  {cartItems.length > 0 && (
                    <span className="absolute -top-1 -right-1 bg-red-600 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center">
                      {cartItems.length}
                    </span>
                  )}
                </button>
                {cartTotal > 0 && (
                  <span className="hidden md:block text-sm font-bold text-red-500">฿{cartTotal.toLocaleString()}</span>
                )}
                <button className="lg:hidden text-white text-2xl">☰</button>
              </div>
            </header>

            {/* Wishlist Content */}
            <section className="px-6 md:px-16 py-16">
              <div className="max-w-5xl mx-auto">
                <div className="flex items-center gap-4 mb-2">
                  <h1 className="text-4xl font-black uppercase tracking-tighter">สินค้าที่ถูกใจ</h1>
                  <span className="bg-red-600 text-white text-sm font-bold px-3 py-1 rounded-full">
                    {wishlistItems.length}
                  </span>
                </div>
                <p className="text-gray-500 text-sm mb-12">รายการสินค้าที่คุณบันทึกไว้</p>

                {wishlistItems.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-32">
                    <div className="text-6xl mb-6 opacity-30">💔</div>
                    <p className="text-gray-500 text-lg font-medium">ยังไม่มีสินค้าที่ถูกใจ</p>
                    <a
                      href="/modules/frontend/home-page/home-page.html#products"
                      className="mt-6 bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold transition-transform hover:scale-105"
                    >
                      เลือกดูสินค้า
                    </a>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {wishlistItems.map((item) => (
                      <div
                        key={item.id}
                        className="bg-[#121212] border border-white/5 rounded-3xl p-5 group hover:border-red-600/50 transition-all hover:-translate-y-2"
                      >
                        <div className="relative mb-4">
                          <button
                            onClick={() => removeFromWishlist(item.id)}
                            className="absolute top-2 right-2 z-10 w-9 h-9 bg-black/60 backdrop-blur-sm rounded-full flex items-center justify-center text-red-500 hover:bg-red-600 hover:text-white transition-colors"
                            title="ลบออกจากรายการถูกใจ"
                          >
                            ❤️
                          </button>
                          <img
                            src={item.image}
                            alt={item.name}
                            className="w-full aspect-square object-cover rounded-2xl group-hover:scale-105 transition-transform duration-500"
                          />
                        </div>
                        <p className="text-[10px] text-gray-600 uppercase tracking-wider mb-1">{item.nameEn}</p>
                        <h3 className="text-base font-bold mb-1 group-hover:text-red-500 transition-colors">
                          {item.name}
                        </h3>
                        <p className="text-xs text-gray-500 mb-4 leading-relaxed">
                          {item.desc}
                        </p>
                        <div className="flex items-center justify-between">
                          <div className="flex items-baseline gap-2">
                            <span className="text-lg font-black text-white">฿{item.price}</span>
                            {item.originalPrice && (
                              <span className="text-xs text-gray-600 line-through">฿{item.originalPrice}</span>
                            )}
                          </div>
                        </div>
                        <button
                          onClick={() => addToCart(item)}
                          className="mt-4 w-full bg-red-600 hover:bg-red-700 px-4 py-3 rounded-xl transition-colors text-white text-sm font-bold flex items-center justify-center gap-2"
                        >
                          🛒 เพิ่มลงตะกร้า
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </section>

            {/* Footer */}
            <footer className="bg-black py-16 border-t border-white/5">
              <div className="container mx-auto px-6 text-center">
                <div className="flex justify-center items-center gap-3 mb-6">
                  <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-black text-xs">
                    TL
                  </div>
                  <span className="font-black text-lg">TOUR LONG</span>
                </div>
                <p className="text-gray-500 text-sm mb-6 max-w-md mx-auto">
                  น้ำพริกทัวร์ลง อร่อยเข้มข้น สูตรหวานน้อย ไม่ใส่ผงชูรส
                  ผลิตจากวัตถุดิบคุณภาพ ส่งตรงถึงบ้านคุณ
                </p>
                <div className="flex justify-center gap-6 text-gray-400 text-sm">
                  <a href="#" className="hover:text-white transition-colors">Facebook</a>
                  <a href="#" className="hover:text-white transition-colors">Instagram</a>
                  <a href="#" className="hover:text-white transition-colors">TikTok</a>
                  <a href="#" className="hover:text-white transition-colors">Shopee</a>
                  <a href="#" className="hover:text-white transition-colors">Lazada</a>
                </div>
                <div className="mt-10 pt-10 border-t border-white/5 text-[10px] uppercase tracking-widest text-gray-700">
                  © 2026 TOUR LONG. น้ำพริกทัวร์ลง — All rights reserved.
                </div>
              </div>
            </footer>
          </div>
        );
      };

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
