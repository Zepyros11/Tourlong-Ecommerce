<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Long</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Plus Jakarta Sans", sans-serif; background: #0a0a0a; color: #fff; }
    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #64748b; font-size: 14px; }
    .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; color: #64748b; }
    .error-page h1 { font-size: 48px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    .error-page p { font-size: 16px; }
    .error-page a { color: #ef4444; text-decoration: none; margin-top: 20px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="pageContent">
    <div class="loading">Loading...</div>
  </div>

  <script>
    // Supabase config
    var SUPABASE_URL = "https://qdexibeljfwtrnfgqhmp.supabase.co";
    var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZXhpYmVsamZ3dHJuZmdxaG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzgwNzEsImV4cCI6MjA5MTMxNDA3MX0.Xlw0tLsv7meuIBdSoGIwlcJ24vZy5djufhUB38cBWd4";
    var headers = { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

    // Get slug from URL - support both /p/slug and ?slug=xxx
    var slug = null;
    var pathMatch = window.location.pathname.match(/\/p\/([^\/]+)/);
    if (pathMatch) {
      slug = pathMatch[1];
    } else {
      var params = new URLSearchParams(window.location.search);
      slug = params.get("slug");
    }

    if (slug) {
      // มี slug → โหลดหน้าตาม slug
      loadPageBySlug(slug);
    } else {
      // ไม่มี slug → โหลดหน้าแรกที่ published (เรียงตาม id)
      loadFirstPage();
    }

    function loadFirstPage() {
      fetch(SUPABASE_URL + "/rest/v1/pages?status=eq.published&select=*&order=id.asc&limit=1", { headers: headers })
        .then(function (res) { return res.json(); })
        .then(function (pages) {
          if (!pages || pages.length === 0) {
            // ไม่มี published page → ลองโหลด draft
            return fetch(SUPABASE_URL + "/rest/v1/pages?select=*&order=id.asc&limit=1", { headers: headers })
              .then(function (res) { return res.json(); });
          }
          return pages;
        })
        .then(function (pages) {
          if (!pages || pages.length === 0) {
            showError("No pages", "ยังไม่มีหน้าเว็บ กรุณาสร้างหน้าใหม่ใน Page Builder");
            return;
          }
          loadPageData(pages[0]);
        })
        .catch(function (err) {
          console.error(err);
          showError("Error", err.message);
        });
    }

    function loadPageBySlug(pageSlug) {
      document.title = "Tour Long — " + pageSlug;
      fetch(SUPABASE_URL + "/rest/v1/pages?slug=eq." + pageSlug + "&select=*", { headers: headers })
        .then(function (res) { return res.json(); })
        .then(function (pages) {
          if (!pages || pages.length === 0) {
            showError("Page not found", pageSlug);
            return;
          }
          loadPageData(pages[0]);
        })
        .catch(function (err) {
          console.error(err);
          showError("Error", err.message);
        });
    }

    function loadPageData(page) {
      document.title = page.name + " — Tour Long";
      applyPageBg(page.bg_settings);
      fetch(SUPABASE_URL + "/rest/v1/blocks?page_id=eq." + page.id + "&select=*&order=sort_order.asc", { headers: headers })
        .then(function (res) { return res.json(); })
        .then(function (blocks) {
          renderPage(blocks);
        });
    }

    function applyPageBg(bg) {
      bg = bg || {};
      var bgType = bg.type || "color";
      var body = document.body;
      if (bgType === "color") {
        body.style.background = bg.color || "#0a0a0a";
      } else if (bgType === "gradient") {
        var gColors = (bg.gradient || "#0a0a0a,#1e293b").split(",");
        body.style.background = "linear-gradient(" + (bg.gradientDir || "135deg") + "," + gColors[0] + "," + (gColors[1] || "#1e293b") + ")";
        body.style.minHeight = "100vh";
      } else if (bgType === "image" && bg.image) {
        var mode = bg.mode || "scroll";
        var attachment = (mode === "fixed" || mode === "parallax") ? "fixed" : "scroll";
        body.style.background = "url('" + bg.image + "') center/cover no-repeat " + attachment;
        body.style.minHeight = "100vh";
        var ov = bg.overlay !== undefined ? bg.overlay : 0.5;
        if (ov > 0) {
          var overlay = document.createElement("div");
          overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0," + ov + ");pointer-events:none;z-index:0;";
          document.body.appendChild(overlay);
          document.getElementById("pageContent").style.position = "relative";
          document.getElementById("pageContent").style.zIndex = "1";
        }
      } else {
        body.style.background = "#0a0a0a";
      }
    }

    function showError(title, message) {
      document.getElementById("pageContent").innerHTML =
        '<div class="error-page">' +
        '<h1>404</h1>' +
        '<p>' + title + ': ' + escapeHtml(message) + '</p>' +
        '<a href="/modules/frontend/page.html?slug=home-page">Go to Home Page</a>' +
        '</div>';
    }

    function renderPage(blocks) {
      var html = "";
      blocks.forEach(function (block) {
        html += renderBlock(block.type, block.data);
      });
      document.getElementById("pageContent").innerHTML = html;
    }

    function renderBlock(type, d) {
      d = d || {};
      switch (type) {
        case "header":
          var pageSlots = (d.navSlots || []).filter(function (s) { return s.name; });
          var navLinks;
          if (pageSlots.length > 0) {
            navLinks = pageSlots.map(function (s) {
              var href = s.slug ? "/modules/frontend/page.html?slug=" + s.slug : "#";
              return '<a href="' + href + '" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;transition:color 0.2s;">' + escapeHtml(s.name) + '</a>';
            }).join("");
          } else {
            navLinks = (d.navItems || []).map(function (item) {
              var navSlug = item.toLowerCase().replace(/[^a-z0-9]+/g, "-");
              return '<a href="/modules/frontend/page.html?slug=' + navSlug + '" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;transition:color 0.2s;">' + escapeHtml(item) + '</a>';
            }).join("");
          }
          var logoSizes = { small: 28, medium: 40, large: 56, xlarge: 72 };
          var lh = logoSizes[d.logoSize] || 40;
          var pageLogo = d.logoImage
            ? '<img src="' + escapeHtml(d.logoImage) + '" style="height:' + lh + 'px;border-radius:8px;" />'
            : '<div style="width:' + lh + 'px;height:' + lh + 'px;background:#ef4444;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;">TL</div>';
          var hFontColor = d.fontColor || '#ffffff';
          return '<header style="display:flex;align-items:center;justify-content:space-between;padding:20px 40px;background:' + (d.bgColor || '#0a0a0a') + ';color:' + hFontColor + ';">' +
            '<a href="/modules/frontend/page.html?slug=home-page" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:' + hFontColor + ';">' +
            pageLogo +
            '<span style="font-weight:800;font-size:18px;">' + escapeHtml(d.logoText || "LOGO") + '</span>' +
            '</a>' +
            '<nav style="display:flex;gap:24px;">' + navLinks.replace(/color:rgba\(255,255,255,0\.7\)/g, 'color:' + hFontColor) + '</nav>' +
            '</header>';

        case "hero":
          var heroFontColor = d.fontColor || '#fff';
          var heroSubColor = d.subColor || heroFontColor;
          return '<section style="background:' + (d.bgColor || '#0a0a0a') + ';padding:80px 40px;text-align:' + (d.textAlign || 'center') + ';">' +
            '<h1 style="font-size:48px;font-weight:800;margin-bottom:16px;color:' + heroFontColor + ';">' + escapeHtml(d.title || "") + '</h1>' +
            '<p style="font-size:18px;color:' + heroSubColor + ';opacity:0.7;margin-bottom:24px;max-width:600px;' + (d.textAlign === 'center' ? 'margin-left:auto;margin-right:auto;' : '') + '">' + escapeHtml(d.subtitle || "") + '</p>' +
            '<a href="#" style="display:inline-block;background:' + (d.btnColor || '#ef4444') + ';color:' + (d.btnFontColor || '#fff') + ';padding:14px 36px;border-radius:999px;font-weight:700;text-decoration:none;">' + escapeHtml(d.buttonText || "Button") + '</a>' +
            '</section>';

        case "text":
          var fs = d.headingSize === "large" ? "36px" : d.headingSize === "small" ? "20px" : "28px";
          var tFontColor = d.fontColor || '#ffffff';
          var tContentColor = d.contentColor || tFontColor;
          var tBtns = "";
          if (d.btn1Show) {
            var tb1Link = escapeHtml(d.btn1Link || "#");
            tBtns += '<a href="' + tb1Link + '" style="display:inline-block;background:' + (d.btn1Color || '#ef4444') + ';color:' + (d.btn1FontColor || '#fff') + ';padding:12px 28px;border-radius:999px;font-weight:700;font-size:14px;text-decoration:none;">' + escapeHtml(d.btn1Text || 'Button') + '</a> ';
          }
          if (d.btn2Show) {
            var tb2Link = escapeHtml(d.btn2Link || "#");
            tBtns += '<a href="' + tb2Link + '" style="display:inline-block;background:' + (d.btn2Color || '#222') + ';color:' + (d.btn2FontColor || '#fff') + ';padding:12px 28px;border-radius:999px;font-weight:700;font-size:14px;text-decoration:none;border:2px solid ' + (d.btn2FontColor || '#fff') + ';">' + escapeHtml(d.btn2Text || 'Button') + '</a>';
          }
          if (tBtns) tBtns = '<div style="margin-top:24px;">' + tBtns + '</div>';
          var tImgPos = d.imagePos || "none";
          var tImgHtml = "";
          if (d.image && tImgPos !== "none") {
            tImgHtml = '<img src="' + escapeHtml(d.image) + '" style="width:100%;border-radius:12px;object-fit:cover;max-height:400px;" />';
          }
          var tTextHtml = (d.heading ? '<h2 style="font-size:' + fs + ';font-weight:800;margin-bottom:16px;color:' + tFontColor + ';">' + escapeHtml(d.heading) + '</h2>' : '') +
            '<p style="font-size:16px;color:' + tContentColor + ';opacity:0.7;line-height:1.8;max-width:800px;' + (d.textAlign === 'center' ? 'margin:0 auto;' : '') + '">' + escapeHtml(d.content || "") + '</p>' + tBtns;
          if (tImgHtml && tImgPos === "top") {
            return '<section style="padding:60px 40px;text-align:' + (d.textAlign || 'left') + ';">' +
              tImgHtml + '<div style="margin-top:24px;">' + tTextHtml + '</div></section>';
          }
          if (tImgHtml && (tImgPos === "left" || tImgPos === "right")) {
            var tDir = tImgPos === "right" ? "flex-direction:row-reverse;" : "";
            return '<section style="padding:60px 40px;"><div style="display:flex;gap:40px;align-items:center;max-width:1000px;margin:0 auto;' + tDir + '">' +
              '<div style="flex:1;min-width:0;">' + tImgHtml + '</div>' +
              '<div style="flex:1;min-width:0;text-align:' + (d.textAlign || 'left') + ';">' + tTextHtml + '</div>' +
              '</div></section>';
          }
          return '<section style="padding:60px 40px;text-align:' + (d.textAlign || 'left') + ';">' + tTextHtml + '</section>';

        case "products":
          var pCols = d.columns || 3;
          var pCardBg = d.cardBg || "#111";
          var pCardRad = d.cardRadius || 16;
          var pImgH = d.imgHeight || 120;
          var pPriceColor = d.priceColor || "#ef4444";
          var pCards = "";
          for (var i = 0; i < Math.min(pCols, d.limit || 6); i++) {
            pCards += '<div style="background:' + pCardBg + ';border-radius:' + pCardRad + 'px;padding:16px;text-align:center;">' +
              '<div style="width:100%;height:' + pImgH + 'px;background:#1a1a2e;border-radius:' + Math.max(pCardRad - 4, 0) + 'px;margin-bottom:12px;"></div>' +
              '<p style="font-weight:700;font-size:14px;color:' + (d.titleColor || '#fff') + ';">Product ' + (i + 1) + '</p>' +
              '<p style="color:' + pPriceColor + ';font-weight:800;font-size:16px;margin-top:4px;">฿69</p>' +
              '</div>';
          }
          return '<section style="padding:60px 40px;">' +
            '<h2 style="font-size:28px;font-weight:800;text-align:center;margin-bottom:32px;color:' + (d.titleColor || '#14b8a6') + ';">' + escapeHtml(d.title || "Products") + '</h2>' +
            '<div style="display:grid;grid-template-columns:repeat(' + pCols + ',1fr);gap:20px;max-width:900px;margin:0 auto;">' + pCards + '</div>' +
            '</section>';

        case "features":
          var fItems = (d.items || []).map(function (item) {
            return '<div style="text-align:center;padding:24px;background:#111;border-radius:16px;">' +
              '<div style="width:48px;height:48px;background:#1a1a2e;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#14b8a6;font-size:20px;">✓</div>' +
              '<p style="font-weight:700;font-size:14px;">' + escapeHtml(item) + '</p>' +
              '</div>';
          }).join("");
          return '<section style="padding:60px 40px;">' +
            '<h2 style="font-size:28px;font-weight:800;text-align:center;margin-bottom:32px;">' + escapeHtml(d.title || "Features") + '</h2>' +
            '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;max-width:900px;margin:0 auto;">' + fItems + '</div>' +
            '</section>';

        case "contact":
          var ctCardBg = d.cardBg || "#111";
          var ctIconColor = d.iconColor || "#14b8a6";
          var ctTextColor = d.textColor || "#fff";
          var ctTitleColor = d.titleColor || "#fff";
          var ctItems = [];
          if (d.phone) ctItems.push({ icon: "📞", label: "Phone", value: d.phone });
          if (d.line) ctItems.push({ icon: "💬", label: "Line", value: d.line });
          if (d.email) ctItems.push({ icon: "📧", label: "Email", value: d.email });
          if (d.address) ctItems.push({ icon: "📍", label: "Address", value: d.address });
          if (d.website) ctItems.push({ icon: "🌐", label: "Website", value: d.website });
          if (d.facebook) ctItems.push({ icon: "📘", label: "Facebook", value: d.facebook });
          if (ctItems.length === 0) ctItems = [
            { icon: "📞", label: "Phone", value: d.phone || "-" },
            { icon: "💬", label: "Line", value: d.line || "-" },
            { icon: "📧", label: "Email", value: d.email || "-" },
          ];
          var ctCardsHtml = ctItems.map(function (ci) {
            return '<div style="background:' + ctCardBg + ';border-radius:16px;padding:24px;"><p style="font-size:24px;margin-bottom:8px;">' + ci.icon + '</p><p style="font-size:12px;color:' + ctTextColor + ';opacity:0.5;margin-bottom:4px;">' + ci.label + '</p><p style="font-weight:700;color:' + ctTextColor + ';">' + escapeHtml(ci.value) + '</p></div>';
          }).join("");
          return '<section style="padding:60px 40px;text-align:center;">' +
            '<h2 style="font-size:28px;font-weight:800;margin-bottom:32px;color:' + ctTitleColor + ';">' + escapeHtml(d.title || "Contact") + '</h2>' +
            '<div style="display:grid;grid-template-columns:repeat(' + Math.min(ctItems.length, 3) + ',1fr);gap:20px;max-width:700px;margin:0 auto;">' + ctCardsHtml + '</div></section>';

        case "cta":
          return '<section style="padding:60px 40px;text-align:center;background:' + (d.bgColor || '#0f172a') + ';">' +
            '<h2 style="font-size:32px;font-weight:800;margin-bottom:12px;color:' + (d.fontColor || '#fff') + ';">' + escapeHtml(d.heading || "CTA") + '</h2>' +
            '<p style="font-size:16px;color:' + (d.descColor || d.fontColor || '#fff') + ';opacity:0.7;margin-bottom:24px;">' + escapeHtml(d.description || "") + '</p>' +
            '<a href="' + escapeHtml(d.buttonLink || "#") + '" style="display:inline-block;background:' + (d.btnColor || '#14b8a6') + ';color:' + (d.btnFontColor || '#fff') + ';padding:14px 36px;border-radius:999px;font-weight:700;text-decoration:none;">' + escapeHtml(d.buttonText || "Button") + '</a>' +
            '</section>';

        case "footer":
          return '<footer style="padding:32px 40px;background:' + (d.bgColor || '#0a0a0a') + ';text-align:center;border-top:1px solid #1e293b;">' +
            '<p style="color:' + (d.fontColor || 'rgba(255,255,255,0.5)') + ';font-size:13px;">' + escapeHtml(d.text || "") + '</p>' +
            '</footer>';

        case "spacer":
          return '<div style="height:' + (d.height || 40) + 'px;"></div>';

        case "divider":
          return '<div style="padding:0 40px;"><hr style="border:none;border-top:2px ' + (d.style || 'solid') + ' ' + (d.color || '#1e293b') + ';margin:20px 0;" /></div>';

        case "gallery":
          var gCols = d.columns || 4;
          var gItems = "";
          for (var g = 0; g < gCols * 2; g++) {
            gItems += '<div style="height:120px;background:linear-gradient(135deg,#111,#1a1a2e);border-radius:12px;"></div>';
          }
          return '<section style="padding:60px 40px;">' +
            '<h2 style="font-size:28px;font-weight:800;text-align:center;margin-bottom:32px;">' + escapeHtml(d.title || "Gallery") + '</h2>' +
            '<div style="display:grid;grid-template-columns:repeat(' + gCols + ',1fr);gap:12px;max-width:900px;margin:0 auto;">' + gItems + '</div>' +
            '</section>';

        case "video":
          return '<section style="padding:60px 40px;text-align:center;">' +
            '<div style="max-width:800px;margin:0 auto;height:400px;background:#111;border-radius:16px;display:flex;align-items:center;justify-content:center;">' +
            '<span style="font-size:48px;opacity:0.3;">▶</span>' +
            '</div></section>';

        case "imagetext":
          var itLayout = d.layout || "image-left";
          var itBg = d.bgColor && d.bgColor !== "transparent" ? "background:" + d.bgColor + ";" : "";
          var itRad = d.imgRadius || 16;
          var itImgH = d.imgHeight || 300;
          var itBtns = "";
          if (d.btn1Show) {
            var itB1Link = d.btn1Link && d.btn1Link !== "#" ? "/modules/frontend/page.html?slug=" + d.btn1Link : "#";
            itBtns += '<a href="' + itB1Link + '" style="display:inline-block;background:' + (d.btn1Color || '#ef4444') + ';color:' + (d.btn1FontColor || '#fff') + ';padding:12px 28px;border-radius:999px;font-weight:700;font-size:14px;text-decoration:none;">' + escapeHtml(d.btn1Text || 'Button') + '</a> ';
          }
          if (d.btn2Show) {
            var itB2Link = d.btn2Link && d.btn2Link !== "#" ? "/modules/frontend/page.html?slug=" + d.btn2Link : "#";
            itBtns += '<a href="' + itB2Link + '" style="display:inline-block;background:' + (d.btn2Color || '#222') + ';color:' + (d.btn2FontColor || '#fff') + ';padding:12px 28px;border-radius:999px;font-weight:700;font-size:14px;text-decoration:none;border:2px solid ' + (d.btn2FontColor || '#fff') + ';">' + escapeHtml(d.btn2Text || 'Button') + '</a>';
          }
          if (itBtns) itBtns = '<div style="margin-top:24px;">' + itBtns + '</div>';
          var itImg = d.image
            ? '<img src="' + escapeHtml(d.image) + '" style="width:100%;height:' + itImgH + 'px;object-fit:cover;border-radius:' + itRad + 'px;" />'
            : '<div style="width:100%;height:' + itImgH + 'px;background:linear-gradient(135deg,#1a1a2e,#0f172a);border-radius:' + itRad + 'px;"></div>';
          var itText = '<div style="' + (itLayout === "image-top" ? "text-align:center;" : "") + '">' +
            '<h2 style="font-size:28px;font-weight:800;margin-bottom:12px;color:' + (d.titleColor || "#fff") + ';">' + escapeHtml(d.title || "") + '</h2>' +
            '<p style="font-size:16px;line-height:1.8;color:' + (d.contentColor || "#94a3b8") + ';">' + escapeHtml(d.content || "") + '</p>' +
            itBtns + '</div>';
          if (itLayout === "image-top") {
            return '<section style="padding:60px 40px;max-width:800px;margin:0 auto;' + itBg + '">' + itImg + '<div style="margin-top:24px;">' + itText + '</div></section>';
          }
          var itDir = itLayout === "image-right" ? "flex-direction:row-reverse;" : "";
          return '<section style="padding:60px 40px;' + itBg + '">' +
            '<div style="display:flex;gap:40px;align-items:center;max-width:1000px;margin:0 auto;' + itDir + '">' +
            '<div style="flex:1;min-width:0;">' + itImg + '</div>' +
            '<div style="flex:1;min-width:0;">' + itText + '</div>' +
            '</div></section>';

        case "cards":
          var ccCols = d.columns || 3;
          var ccBg = d.cardBg || "#111";
          var ccTitleC = d.titleColor || "#fff";
          var ccDescC = d.descColor || "#94a3b8";
          var ccBtnC = d.btnColor || "#6366f1";
          var ccRad = d.cardRadius || 16;
          var ccImgH = d.imgHeight || 140;
          var ccCards = (d.cards || []).map(function (card) {
            var cImg = card.image
              ? '<img src="' + escapeHtml(card.image) + '" style="width:100%;height:' + ccImgH + 'px;object-fit:cover;" />'
              : '<div style="width:100%;height:' + ccImgH + 'px;background:linear-gradient(135deg,#1a1a2e,#0f172a);"></div>';
            var cLink = card.link && card.link !== "#" ? "/modules/frontend/page.html?slug=" + card.link : "#";
            return '<div style="background:' + ccBg + ';border-radius:' + ccRad + 'px;overflow:hidden;text-align:center;border:1px solid rgba(255,255,255,0.05);">' +
              cImg +
              '<div style="padding:20px;">' +
              '<p style="font-weight:700;font-size:16px;margin-bottom:6px;color:' + ccTitleC + ';">' + escapeHtml(card.title) + '</p>' +
              '<p style="font-size:13px;color:' + ccDescC + ';margin-bottom:14px;line-height:1.5;">' + escapeHtml(card.desc) + '</p>' +
              '<a href="' + cLink + '" style="display:inline-block;background:' + ccBtnC + ';color:#fff;padding:10px 24px;border-radius:999px;font-size:12px;font-weight:700;text-decoration:none;">Read More</a>' +
              '</div></div>';
          }).join("");
          return '<section style="padding:60px 40px;"><div style="display:grid;grid-template-columns:repeat(' + ccCols + ',1fr);gap:20px;max-width:1000px;margin:0 auto;">' + ccCards + '</div></section>';

        case "carousel":
          var ccSlide = (d.slides && d.slides[0]) || {};
          var ccImg = ccSlide.image
            ? '<img src="' + escapeHtml(ccSlide.image) + '" style="width:100%;height:400px;object-fit:cover;border-radius:16px;" />'
            : '<div style="width:100%;height:400px;background:linear-gradient(135deg,#1a1a2e,#0f172a);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;">' + escapeHtml(ccSlide.caption || "Slide") + '</div>';
          return '<section style="padding:40px;max-width:900px;margin:0 auto;">' + ccImg + '</section>';

        case "twocol":
          var ccRatio = { "50-50": ["1fr","1fr"], "60-40": ["3fr","2fr"], "40-60": ["2fr","3fr"], "70-30": ["7fr","3fr"], "30-70": ["3fr","7fr"] };
          var ccC = ccRatio[d.ratio] || ["1fr","1fr"];
          return '<section style="padding:60px 40px;"><div style="display:grid;grid-template-columns:' + ccC.join(" ") + ';gap:32px;max-width:900px;margin:0 auto;">' +
            '<div>' + (d.leftTitle ? '<h2 style="font-size:28px;font-weight:800;margin-bottom:12px;">' + escapeHtml(d.leftTitle) + '</h2>' : '') +
            '<p style="font-size:16px;color:rgba(255,255,255,0.7);line-height:1.8;">' + escapeHtml(d.leftContent || "") + '</p></div>' +
            '<div>' + (d.rightTitle ? '<h2 style="font-size:28px;font-weight:800;margin-bottom:12px;">' + escapeHtml(d.rightTitle) + '</h2>' : '') +
            '<p style="font-size:16px;color:rgba(255,255,255,0.7);line-height:1.8;">' + escapeHtml(d.rightContent || "") + '</p></div>' +
            '</div></section>';

        case "testimonial":
          var ccRevs = (d.reviews || []).map(function (rev) {
            var st = ''; for (var s = 0; s < (rev.rating||5); s++) st += '&#9733;';
            return '<div style="background:#111;border-radius:16px;padding:28px;text-align:center;">' +
              '<div style="font-size:20px;color:#f59e0b;margin-bottom:12px;">' + st + '</div>' +
              '<p style="font-size:15px;color:rgba(255,255,255,0.8);font-style:italic;margin-bottom:16px;line-height:1.6;">"' + escapeHtml(rev.text) + '"</p>' +
              '<p style="font-weight:700;font-size:14px;">' + escapeHtml(rev.name) + '</p></div>';
          }).join("");
          return '<section style="padding:60px 40px;"><div style="display:grid;grid-template-columns:repeat(' + Math.min((d.reviews||[]).length,3) + ',1fr);gap:20px;max-width:900px;margin:0 auto;">' + ccRevs + '</div></section>';

        default:
          return '';
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
