<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Bank Accounts</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Bank Accounts</h2>
              <p class="content-subtitle">จัดการบัญชีธนาคาร</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addAccountBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Add Account
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="landmark" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Accounts</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="banknote" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Total Balance</p>
                <p class="stat-card-value" id="statBalance">฿0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search account..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="name-asc">Name A-Z</option>
                <option value="balance-desc">Balance High-Low</option>
                <option value="balance-asc">Balance Low-High</option>
              </select>
            </div>
          </div>

          <!-- Bank Accounts Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="bank">ธนาคาร</th>
                  <th data-sort="account">ชื่อบัญชี</th>
                  <th data-sort="number">เลขบัญชี</th>
                  <th data-sort="balance" data-sort-type="number">ยอดคงเหลือ</th>
                  <th data-sort="status">สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="accountTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Account -->
    <div class="modal-overlay" id="accountModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Account</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;">
              <span>Bank Name</span>
              <button type="button" class="btn-icon-sm" id="manageBanksBtn" title="จัดการรายชื่อธนาคาร" style="padding:4px 8px;font-size:10px;color:#0f766e;background:#ccfbf1;border:1px solid #5eead4;border-radius:6px;display:inline-flex;align-items:center;gap:4px;cursor:pointer;">
                <i data-lucide="settings" style="width:12px;height:12px;"></i>
                <span>Manage</span>
              </button>
            </label>
            <select class="form-select" id="inputBank">
              <!-- options โหลดจาก banks table -->
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Account Name</label>
            <input type="text" class="form-input" id="inputAccountName" placeholder="ชื่อบัญชี..." />
          </div>
          <div class="form-group">
            <label class="form-label">Account Number</label>
            <input type="text" class="form-input" id="inputAccountNumber" placeholder="เลขที่บัญชี..." />
          </div>
          <div class="form-group">
            <label class="form-label">Balance</label>
            <input type="number" class="form-input" id="inputBalance" placeholder="ยอดเงิน..." />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <div class="status-toggle">
              <label class="toggle">
                <input type="checkbox" id="inputStatus" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="status-toggle-label active-label" id="inputStatusLabel">Active</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('accountModal')">Cancel</button>
          <button class="btn-primary" onclick="saveAccount()">Save</button>
        </div>
      </div>
    </div>

    <!-- Modal Manage Banks -->
    <div class="modal-overlay" id="manageBanksModal">
      <div class="modal" style="max-width:520px;">
        <div class="modal-header">
          <h3 class="modal-title">จัดการรายชื่อธนาคาร</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input type="text" class="form-input" id="bankNameInput" placeholder="ชื่อธนาคาร เช่น ธนาคารกรุงศรี..." style="flex:1;" />
            <button type="button" class="btn-primary" id="bankAddBtn" style="white-space:nowrap;">
              <i data-lucide="plus" class="btn-icon"></i>
              เพิ่ม
            </button>
          </div>
          <input type="hidden" id="bankEditId" />

          <div class="table-container" style="max-height:340px;overflow-y:auto;">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>ชื่อธนาคาร</th>
                  <th style="width:100px;">จัดการ</th>
                </tr>
              </thead>
              <tbody id="bankTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('manageBanksModal')">ปิด</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/toast.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("bank-accounts.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Finance", page: "บัญชีธนาคาร" });</script>
    <script src="/modules/backend/assets/js/app-mode.js"></script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="bank-accounts.js"></script>
  </body>
</html>
