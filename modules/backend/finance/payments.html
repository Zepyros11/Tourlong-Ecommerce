<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Payments</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Payments</h2>
              <p class="content-subtitle">จัดการรายรับ</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addPaymentBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Add Payment
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="credit-card" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Payments</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Completed</p>
                <p class="stat-card-value" id="statCompleted">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon" style="background-color:#fef3c7;color:#f59e0b;">
                <i data-lucide="clock" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Pending</p>
                <p class="stat-card-value" id="statPending">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="completed">Completed</button>
              <button class="filter-btn" data-status="pending">Pending</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search payment..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Date: Newest</option>
                <option value="date-asc">Date: Oldest</option>
                <option value="amount-desc">Amount: High-Low</option>
                <option value="amount-asc">Amount: Low-High</option>
              </select>
            </div>
          </div>

          <!-- Payments Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="date" data-sort-type="date">วันที่</th>
                  <th data-sort="invoice">อ้างอิงใบแจ้งหนี้</th>
                  <th data-sort="customer">ลูกค้า</th>
                  <th data-sort="method">วิธีการชำระเงิน</th>
                  <th data-sort="amount" data-sort-type="number">ยอดรวม</th>
                  <th data-sort="status">สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="paymentTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Payment -->
    <div class="modal-overlay" id="paymentModal">
      <div class="modal" style="max-width:620px;">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Payment</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Payment Number</label>
              <input type="text" class="form-input" id="inputPaymentNumber" readonly />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Date</label>
              <input type="date" class="form-input" id="inputDate" />
            </div>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Direction</label>
            <select class="form-select" id="inputDirection" onchange="onDirectionChange()">
              <option value="incoming">Incoming (รับจากลูกค้า)</option>
              <option value="outgoing">Outgoing (จ่ายซัพพลาย)</option>
            </select>
          </div>

          <!-- Incoming fields -->
          <div id="incomingFields">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
              <div class="form-group" style="margin:0;">
                <label class="form-label">Invoice (optional)</label>
                <select class="form-select" id="inputInvoice" onchange="onInvoiceChange()"></select>
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Customer</label>
                <select class="form-select" id="inputCustomer"></select>
              </div>
            </div>
          </div>

          <!-- Outgoing fields -->
          <div id="outgoingFields" style="display:none;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
              <div class="form-group" style="margin:0;">
                <label class="form-label">PO (optional)</label>
                <select class="form-select" id="inputPO" onchange="onPOChange()"></select>
              </div>
              <div class="form-group" style="margin:0;">
                <label class="form-label">Supplier</label>
                <select class="form-select" id="inputSupplier"></select>
              </div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Bank Account</label>
              <select class="form-select" id="inputBankAccount"></select>
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Method</label>
              <select class="form-select" id="inputMethod">
                <option value="โอนธนาคาร">โอนธนาคาร</option>
                <option value="เงินสด">เงินสด</option>
                <option value="บัตรเครดิต">บัตรเครดิต</option>
                <option value="เช็ค">เช็ค</option>
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Amount</label>
              <input type="number" class="form-input" id="inputAmount" placeholder="0.00" min="0" step="0.01" />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Status</label>
              <select class="form-select" id="inputStatus">
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Note</label>
            <input type="text" class="form-input" id="inputNote" placeholder="หมายเหตุ..." />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('paymentModal')">Cancel</button>
          <button class="btn-primary" onclick="savePayment()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("payments.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Finance", page: "รายรับ" });</script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="payments.js"></script>
  </body>
</html>
