<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Add Product</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/backend.css" />
    <style>
      .form-section { background:#fff; border:1px solid #f1f5f9; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 10px 40px -10px rgba(0,0,0,0.04); }
      .form-section-title { font-size:12px; font-weight:800; color:#1e293b; margin:0 0 14px; display:flex; align-items:center; gap:6px; }
      .form-section-title i { width:14px; height:14px; color:#47b8b4; }

      /* Image Upload */
      .img-grid { display:flex; gap:8px; flex-wrap:wrap; }
      .img-card { width:100px; height:100px; border-radius:10px; overflow:hidden; position:relative; border:1px solid #e2e8f0; flex-shrink:0; }
      .img-card img { width:100%; height:100%; object-fit:cover; }
      .img-card-remove { position:absolute; top:4px; right:4px; width:18px; height:18px; background:#ef4444; border:none; border-radius:50%; color:#fff; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
      .img-add { width:100px; height:100px; border:2px dashed #e2e8f0; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; color:#94a3b8; flex-shrink:0; }
      .img-add:hover { border-color:#47b8b4; color:#47b8b4; }
      .img-add-icon { font-size:20px; }
      .img-add-text { font-size:8px; margin-top:2px; }

      /* Drag & Drop */
      .img-grid.drag-over { outline:2px dashed #47b8b4; outline-offset:4px; border-radius:12px; background:rgba(71,184,180,0.04); }
      .img-card.dragging { opacity:0.4; }
      .img-card.drag-target { box-shadow:0 0 0 2px #47b8b4; }

      /* Variant Table */
      .variant-table { width:100%; border-collapse:collapse; }
      .variant-table th { text-align:left; padding:6px 8px; font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; }
      .variant-table td { padding:4px 6px; }
      .variant-table input, .variant-table select { font-size:10px; padding:6px 8px; }

      /* Product Block */
      .product-block { position: relative; background:#fff; border:1px solid #f1f5f9; border-radius:14px; padding:18px; margin-bottom:12px; box-shadow:0 10px 40px -10px rgba(0,0,0,0.04); }
      .product-block-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
      .product-block-title { font-size:11px; font-weight:800; color:#47b8b4; margin:0; display:flex; align-items:center; gap:6px; }
      .product-block-title i { width:14px; height:14px; }
      .product-block-remove { width:22px; height:22px; background:#fef2f2; border:none; border-radius:6px; color:#ef4444; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:background 0.2s; }
      .product-block-remove:hover { background:#fee2e2; }
      .block-divider { border:none; border-top:2px dashed #e2e8f0; margin:0 0 12px; }

      /* Barcode Preview (tiny inline) */
      .barcode-preview { display:none; align-items:center; justify-content:center; cursor:pointer; background:#f8fafc; border:1px solid #e2e8f0; border-radius:4px; padding:2px 4px; margin-left:6px; height:24px; flex-shrink:0; vertical-align:middle; }
      .barcode-preview svg { height:18px; width:auto; }
      .barcode-preview:hover { border-color:#47b8b4; background:#f0fdfa; }

      /* Barcode input row */
      .barcode-input-wrap { display:flex; align-items:center; }
      .barcode-input-wrap .form-input { flex:1; min-width:0; }

      /* Barcode Popup */
      .barcode-popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:1000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
      .barcode-popup { background:#fff; border-radius:16px; padding:20px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.15); min-width:280px; max-width:90vw; }
      .barcode-popup-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
      .barcode-popup-close { background:none; border:none; font-size:18px; color:#94a3b8; cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; }
      .barcode-popup-close:hover { background:#f1f5f9; color:#1e293b; }
      .barcode-popup-body { text-align:center; }
      .barcode-popup-body svg { max-width:100%; }

      /* Form Actions Bar */
      .form-actions { display:flex; align-items:center; justify-content:space-between; padding:16px 0; }
      .form-actions-right { display:flex; gap:8px; }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon"><i data-lucide="zap" class="sidebar-icon-sm"></i></div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>
        <nav class="sidebar-nav"></nav>
        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <div class="main-area">
        <header class="topbar"></header>

        <div class="content">
          <!-- Header -->
          <div class="content-header">
            <div>
              <h2 class="content-title" id="pageTitle">Add Product</h2>
              <p class="content-subtitle" id="pageSubtitle">เพิ่มสินค้าใหม่</p>
            </div>
            <a href="products-list.html" class="btn-outline" style="text-decoration:none;">
              <i data-lucide="arrow-left" class="btn-icon"></i> กลับรายการสินค้า
            </a>
          </div>

          <!-- Product Blocks Container -->
          <div id="productBlocks">
            <!-- render จาก JS -->
          </div>

          <!-- Actions -->
          <div style="margin-top:14px;">
            <div class="form-actions" style="padding:0;">
              <div></div>
              <div class="form-actions-right">
                <a href="products-list.html" class="btn-secondary" style="text-decoration:none;display:inline-flex;align-items:center;">Cancel</a>
                <button class="btn-primary" onclick="saveAllProducts()">Save</button>
              </div>
            </div>
          </div>
        </div>

        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Toast Notification -->
    <!-- Toast -->
    <div id="toast" style="position:fixed;top:30px;left:50%;transform:translateX(-50%) translateY(-120px);display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#10b981,#059669);padding:18px 32px;border-radius:16px;box-shadow:0 20px 50px rgba(16,185,129,0.3);z-index:999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;opacity:0;">
      <div style="width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i data-lucide="check" style="width:22px;height:22px;color:#fff;"></i>
      </div>
      <div>
        <p id="toastTitle" style="font-size:15px;font-weight:800;color:#fff;margin:0;">บันทึกสำเร็จ!</p>
        <p id="toastMsg" style="font-size:11px;color:rgba(255,255,255,0.8);margin:3px 0 0;"></p>
      </div>
    </div>

    <script src="/assets/js/esc-close.js"></script>
    <script src="../../assets/js/table.js"></script>
    <script src="../../assets/js/modal.js"></script>
    <script src="../../assets/js/enter-save.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu();</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Inventory", page: "เพิ่มสินค้า" });</script>
    <script src="products-form.js"></script>
  </body>
</html>
