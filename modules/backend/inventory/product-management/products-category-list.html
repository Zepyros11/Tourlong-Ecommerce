<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Product Category</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Product Category</h2>
              <p class="content-subtitle">จัดการหมวดหมู่สินค้าทั้งหมด</p>
            </div>
            <button class="btn-primary">
              <i data-lucide="plus" class="btn-icon"></i>
              Add Category
            </button>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards" id="statCards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="layers" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Categories</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Active</p>
                <p class="stat-card-value" id="statActive">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-inactive">
                <i data-lucide="x-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Inactive</p>
                <p class="stat-card-value" id="statInactive">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="active">Active</button>
              <button class="filter-btn" data-status="inactive">Inactive</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search category..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
                <option value="products-desc">Products: High-Low</option>
                <option value="products-asc">Products: Low-High</option>
              </select>
            </div>
          </div>

          <!-- Category Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="name">ชื่อหมวดหมู่</th>
                  <th data-sort="desc">รายละเอียด</th>
                  <th data-sort="products" data-sort-type="number">สินค้า</th>
                  <th data-sort="status">สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="categoryTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Category -->
    <div class="modal-overlay" id="categoryModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Category</h3>
          <button class="modal-close">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Category Name</label>
            <input type="text" class="form-input" id="inputName" placeholder="ชื่อหมวดหมู่..." />
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" class="form-input" id="inputDesc" placeholder="รายละเอียด..." />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <div class="status-toggle">
              <label class="toggle">
                <input type="checkbox" id="inputStatus" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="status-toggle-label active-label" id="inputStatusLabel">Active</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('categoryModal')">Cancel</button>
          <button class="btn-primary" id="modalSaveBtn" onclick="saveCategory()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal (ใช้ร่วมจาก confirm.js) -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../../assets/js/modal.js"></script>
    <script src="../../assets/js/enter-save.js"></script>
    <script src="../../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/toast.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("products-category-list.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Inventory", page: "หมวดหมู่สินค้า" });</script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="products-category-list.js"></script>
  </body>
</html>
