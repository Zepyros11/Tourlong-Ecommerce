<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Warehouses</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon"><i data-lucide="zap" class="sidebar-icon-sm"></i></div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>
        <nav class="sidebar-nav"></nav>
        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <div class="main-area">
        <header class="topbar"></header>

        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Warehouses</h2>
              <p class="content-subtitle">จัดการคลังสินค้า</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addWhBtn">
                <i data-lucide="plus" class="btn-icon"></i> Add Warehouse
              </button>
            </div>
          </div>

          <!-- Stat Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all"><i data-lucide="warehouse" class="stat-icon"></i></div>
              <div>
                <p class="stat-card-label">All Warehouses</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active"><i data-lucide="check-circle" class="stat-icon"></i></div>
              <div>
                <p class="stat-card-label">Active</p>
                <p class="stat-card-value" id="statActive">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search warehouse..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
              </select>
            </div>
          </div>

          <!-- Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="name">ชื่อคลังสินค้า</th>
                  <th>ตำแหน่ง</th>
                  <th>ผู้จัดการ</th>
                  <th>สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="whTableBody"></tbody>
            </table>
          </div>
        </div>

        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal: Add/Edit Warehouse -->
    <div class="modal-overlay" id="whModal">
      <div class="modal" style="width:500px;">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Warehouse</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <input type="hidden" id="inputCode" />
          <div class="form-group">
            <label class="form-label">Warehouse Name</label>
            <input type="text" class="form-input" id="inputName" placeholder="ชื่อคลังสินค้า..." />
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" class="form-input" id="inputLocation" placeholder="ที่ตั้ง / ที่อยู่..." />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">Manager</label>
              <input type="text" class="form-input" id="inputManager" placeholder="ผู้จัดการคลัง..." />
            </div>
            <div class="form-group">
              <label class="form-label">Status</label>
              <div class="status-toggle">
                <label class="toggle">
                  <input type="checkbox" id="inputStatus" checked />
                  <span class="toggle-slider"></span>
                </label>
                <span class="status-toggle-label active-label" id="inputStatusLabel">Active</span>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('whModal')">Cancel</button>
          <button class="btn-primary" onclick="saveWarehouse()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../../assets/js/modal.js"></script>
    <script src="../../assets/js/enter-save.js"></script>
    <script src="../../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu();</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Inventory", page: "คลังสินค้า" });</script>
    <script src="/modules/backend/assets/js/app-mode.js"></script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="warehouses.js"></script>
  </body>
</html>
