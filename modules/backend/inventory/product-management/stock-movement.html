<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Stock Movement</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Stock Movement</h2>
              <p class="content-subtitle">ประวัติการเคลื่อนไหวสินค้า</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addMovementBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Add Movement
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="repeat" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Movements</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="arrow-down-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Stock In</p>
                <p class="stat-card-value" id="statIn">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-inactive">
                <i data-lucide="arrow-up-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Stock Out</p>
                <p class="stat-card-value" id="statOut">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="in">Stock In</button>
              <button class="filter-btn" data-status="out">Stock Out</button>
              <button class="filter-btn" data-status="transfer">Transfer</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search movement..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Date: Newest</option>
                <option value="date-asc">Date: Oldest</option>
                <option value="qty-desc">Qty: High-Low</option>
                <option value="qty-asc">Qty: Low-High</option>
              </select>
            </div>
          </div>

          <!-- Stock Movement Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="date" data-sort-type="date">Date</th>
                  <th data-sort="product">Product Name</th>
                  <th data-sort="type">Type</th>
                  <th data-sort="warehouse">Warehouse</th>
                  <th data-sort="qty" data-sort-type="number">Qty</th>
                  <th data-sort="note">Note</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="movementTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Movement -->
    <div class="modal-overlay" id="movementModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Movement</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-select" id="inputType">
              <option value="in">Stock In (รับเข้า)</option>
              <option value="out">Stock Out (จ่ายออก)</option>
              <option value="transfer">Transfer (โอนย้าย)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Product</label>
            <select class="form-select" id="inputProduct">
              <option value="Wireless Headphones">Wireless Headphones</option>
              <option value="Running Shoes">Running Shoes</option>
              <option value="Cotton T-Shirt">Cotton T-Shirt</option>
              <option value="Yoga Mat">Yoga Mat</option>
              <option value="Protein Powder">Protein Powder</option>
              <option value="Smart Watch">Smart Watch</option>
              <option value="Leather Wallet">Leather Wallet</option>
              <option value="Face Serum">Face Serum</option>
              <option value="Desk Lamp">Desk Lamp</option>
              <option value="JavaScript Handbook">JavaScript Handbook</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Warehouse</label>
            <select class="form-select" id="inputWarehouse">
              <option value="คลังกลาง กรุงเทพ">คลังกลาง กรุงเทพ</option>
              <option value="คลังภาคเหนือ">คลังภาคเหนือ</option>
              <option value="คลังภาคใต้">คลังภาคใต้</option>
              <option value="คลังออนไลน์">คลังออนไลน์</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-input" id="inputQty" placeholder="0" min="0" />
          </div>
          <div class="form-group">
            <label class="form-label">Note</label>
            <input type="text" class="form-input" id="inputNote" placeholder="หมายเหตุ..." />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('movementModal')">Cancel</button>
          <button class="btn-primary" onclick="saveMovement()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../../assets/js/table.js"></script>
    <script src="../../assets/js/modal.js"></script>
    <script src="../../assets/js/confirm.js"></script>
    <script src="../../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("stock-movement.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Inventory", page: "เคลื่อนไหวสินค้า" });</script>
    <script src="stock-movement.js"></script>
  </body>
</html>
