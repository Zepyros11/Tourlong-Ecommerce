<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Sales Orders</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Sales Orders</h2>
              <p class="content-subtitle">จัดการคำสั่งซื้อ</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addSOBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Create Order
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="shopping-cart" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Orders</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Completed</p>
                <p class="stat-card-value" id="statCompleted">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon" style="background-color:#fef3c7;color:#f59e0b;">
                <i data-lucide="clock" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Processing</p>
                <p class="stat-card-value" id="statProcessing">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-inactive">
                <i data-lucide="x-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Cancelled</p>
                <p class="stat-card-value" id="statCancelled">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="completed">Completed</button>
              <button class="filter-btn" data-status="processing">Processing</button>
              <button class="filter-btn" data-status="cancelled">Cancelled</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search order..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Date: Newest</option>
                <option value="date-asc">Date: Oldest</option>
                <option value="amount-desc">Amount: High-Low</option>
                <option value="amount-asc">Amount: Low-High</option>
              </select>
            </div>
          </div>

          <!-- Sales Orders Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="order">Order No.</th>
                  <th data-sort="customer">Customer</th>
                  <th data-sort="date" data-sort-type="date">Date</th>
                  <th data-sort="items" data-sort-type="number">Items</th>
                  <th data-sort="amount" data-sort-type="number">Total Amount</th>
                  <th data-sort="status">Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="soTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit SO -->
    <div class="modal-overlay" id="soModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Create Order</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Order No.</label>
            <input type="text" class="form-input" id="inputSONumber" placeholder="เลข SO..." readonly />
          </div>
          <div class="form-group">
            <label class="form-label">Customer</label>
            <select class="form-select" id="inputCustomer">
              <option value="บ.เอบีซี จำกัด">บ.เอบีซี จำกัด</option>
              <option value="คุณสมศรี จันทร์ดี">คุณสมศรี จันทร์ดี</option>
              <option value="บ.XYZ เทรดดิ้ง">บ.XYZ เทรดดิ้ง</option>
              <option value="คุณธนา ใจงาม">คุณธนา ใจงาม</option>
              <option value="คุณนภา รักดี">คุณนภา รักดี</option>
              <option value="คุณวิชัย สุขสม">คุณวิชัย สุขสม</option>
              <option value="บ.สตาร์มาร์ท จำกัด">บ.สตาร์มาร์ท จำกัด</option>
              <option value="บ.แฮปปี้โฮม จำกัด">บ.แฮปปี้โฮม จำกัด</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="inputDate" />
          </div>
          <div class="form-group">
            <label class="form-label">Items</label>
            <input type="number" class="form-input" id="inputItems" placeholder="จำนวนรายการ..." />
          </div>
          <div class="form-group">
            <label class="form-label">Total Amount</label>
            <input type="number" class="form-input" id="inputAmount" placeholder="ยอดรวม..." />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="inputStatus">
              <option value="processing">Processing</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('soModal')">Cancel</button>
          <button class="btn-primary" onclick="saveSO()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("sales-orders.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Sales", page: "คำสั่งซื้อ" });</script>
    <script src="sales-orders.js"></script>
  </body>
</html>
