<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Invoices</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Invoices</h2>
              <p class="content-subtitle">จัดการใบแจ้งหนี้</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addInvoiceBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Create Invoice
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="receipt" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Invoices</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Paid</p>
                <p class="stat-card-value" id="statPaid">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon" style="background-color:#fef3c7;color:#f59e0b;">
                <i data-lucide="clock" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Unpaid</p>
                <p class="stat-card-value" id="statUnpaid">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-inactive">
                <i data-lucide="alert-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Overdue</p>
                <p class="stat-card-value" id="statOverdue">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="paid">Paid</button>
              <button class="filter-btn" data-status="unpaid">Unpaid</button>
              <button class="filter-btn" data-status="overdue">Overdue</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search invoice..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Date: Newest</option>
                <option value="date-asc">Date: Oldest</option>
                <option value="amount-desc">Amount: High-Low</option>
                <option value="amount-asc">Amount: Low-High</option>
              </select>
            </div>
          </div>

          <!-- Invoices Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="invoice">Invoice No.</th>
                  <th data-sort="soref">SO Reference</th>
                  <th data-sort="customer">Customer</th>
                  <th data-sort="date" data-sort-type="date">Date</th>
                  <th data-sort="due" data-sort-type="date">Due Date</th>
                  <th data-sort="amount" data-sort-type="number">Amount</th>
                  <th data-sort="status">Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="invoiceTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Invoice -->
    <div class="modal-overlay" id="invoiceModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Create Invoice</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Invoice Number</label>
            <input type="text" class="form-input" id="inputInvoiceNumber" placeholder="เลข Invoice..." readonly />
          </div>
          <div class="form-group">
            <label class="form-label">SO Reference</label>
            <select class="form-select" id="inputSO">
              <option value="SO-2026-147">SO-2026-147</option>
              <option value="SO-2026-148">SO-2026-148</option>
              <option value="SO-2026-149">SO-2026-149</option>
              <option value="SO-2026-150">SO-2026-150</option>
              <option value="SO-2026-151">SO-2026-151</option>
              <option value="SO-2026-152">SO-2026-152</option>
              <option value="SO-2026-153">SO-2026-153</option>
              <option value="SO-2026-154">SO-2026-154</option>
              <option value="SO-2026-155">SO-2026-155</option>
              <option value="SO-2026-156">SO-2026-156</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Customer</label>
            <input type="text" class="form-input" id="inputCustomer" placeholder="ชื่อลูกค้า..." />
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="inputDate" />
          </div>
          <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" class="form-input" id="inputDueDate" />
          </div>
          <div class="form-group">
            <label class="form-label">Amount</label>
            <input type="number" class="form-input" id="inputAmount" placeholder="ยอดรวม..." />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-select" id="inputStatus">
              <option value="unpaid">Unpaid</option>
              <option value="paid">Paid</option>
              <option value="overdue">Overdue</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('invoiceModal')">Cancel</button>
          <button class="btn-primary" onclick="saveInvoice()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("invoices.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Sales", page: "ใบแจ้งหนี้" });</script>
    <script src="invoices.js"></script>
  </body>
</html>
