<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Activity Log</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Activity Log</h2>
              <p class="content-subtitle">ประวัติการใช้งานระบบ</p>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="file-text" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Total Logs</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="calendar" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Today</p>
                <p class="stat-card-value" id="statToday">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon" style="background-color:#fef3c7;color:#f59e0b;">
                <i data-lucide="users" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Users Active</p>
                <p class="stat-card-value" id="statUsers">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-action="all">All</button>
              <button class="filter-btn" data-action="create">Create</button>
              <button class="filter-btn" data-action="update">Update</button>
              <button class="filter-btn" data-action="delete">Delete</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search log..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Newest First</option>
                <option value="date-asc">Oldest First</option>
              </select>
            </div>
          </div>

          <!-- Activity Log Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="date" data-sort-type="date">Date & Time</th>
                  <th data-sort="user">User</th>
                  <th data-sort="action">Action</th>
                  <th data-sort="module">Module</th>
                  <th data-sort="desc">Description</th>
                </tr>
              </thead>
              <tbody id="logTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("activity-log.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Settings", page: "ประวัติการใช้งาน" });</script>
    <script src="activity-log.js"></script>
  </body>
</html>
