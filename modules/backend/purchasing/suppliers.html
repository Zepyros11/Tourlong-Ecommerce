<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Suppliers</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>Go Out</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Suppliers</h2>
              <p class="content-subtitle">จัดการข้อมูลผู้ขาย</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addSupplierBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Add Supplier
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="store" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Suppliers</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Active</p>
                <p class="stat-card-value" id="statActive">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-inactive">
                <i data-lucide="x-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Inactive</p>
                <p class="stat-card-value" id="statInactive">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="active">Active</button>
              <button class="filter-btn" data-status="inactive">Inactive</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search supplier..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
              </select>
            </div>
          </div>

          <!-- Suppliers Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="name">Supplier Name</th>
                  <th data-sort="contact">Contact Person</th>
                  <th data-sort="phone">Phone</th>
                  <th data-sort="email">Email</th>
                  <th data-sort="status">Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="supplierTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Supplier -->
    <div class="modal-overlay" id="supplierModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Supplier</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Supplier Name</label>
            <input type="text" class="form-input" id="inputName" placeholder="ชื่อผู้ขาย..." />
          </div>
          <div class="form-group">
            <label class="form-label">Contact Person</label>
            <input type="text" class="form-input" id="inputContact" placeholder="ชื่อผู้ติดต่อ..." />
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="text" class="form-input" id="inputPhone" placeholder="เบอร์โทร..." />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="text" class="form-input" id="inputEmail" placeholder="อีเมล..." />
          </div>
          <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" class="form-input" id="inputAddress" placeholder="ที่อยู่..." />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <div class="status-toggle">
              <label class="toggle">
                <input type="checkbox" id="inputStatus" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="status-toggle-label active-label" id="inputStatusLabel">Active</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('supplierModal')">Cancel</button>
          <button class="btn-primary" onclick="saveSupplier()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("suppliers.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Purchasing", page: "ผู้ขาย" });</script>
    <script src="suppliers.js"></script>
  </body>
</html>
