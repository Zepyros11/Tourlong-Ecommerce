<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Goods Receive</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Goods Receive</h2>
              <p class="content-subtitle">รับสินค้าเข้าคลัง</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addGRBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Create GR
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="package-check" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All GR</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Completed</p>
                <p class="stat-card-value" id="statCompleted">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon" style="background-color:#fef3c7;color:#f59e0b;">
                <i data-lucide="clock" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Pending</p>
                <p class="stat-card-value" id="statPending">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <button class="filter-btn active" data-status="all">All</button>
              <button class="filter-btn" data-status="completed">Completed</button>
              <button class="filter-btn" data-status="pending">Pending</button>
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search GR..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="date-desc">Date Newest</option>
                <option value="date-asc">Date Oldest</option>
              </select>
            </div>
          </div>

          <!-- Goods Receive Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="gr">เลขที่ GR</th>
                  <th data-sort="poref">อ้างอิง PO</th>
                  <th data-sort="supplier">ผู้ขาย</th>
                  <th data-sort="date" data-sort-type="date">วันที่รับ</th>
                  <th data-sort="items" data-sort-type="number">รายการ</th>
                  <th data-sort="status">สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="grTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit GR -->
    <div class="modal-overlay" id="grModal">
      <div class="modal" style="max-width:720px;">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Create GR</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">GR Number</label>
              <input type="text" class="form-input" id="inputGRNumber" readonly />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Receive Date</label>
              <input type="date" class="form-input" id="inputDate" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">PO Reference (optional)</label>
              <select class="form-select" id="inputPO" onchange="onPOChange()"></select>
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Supplier</label>
              <select class="form-select" id="inputSupplier"></select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Warehouse (รับเข้า)</label>
              <select class="form-select" id="inputWarehouse"></select>
            </div>
            <div class="form-group" style="margin:0;">
              <label class="form-label">Status</label>
              <select class="form-select" id="inputStatus">
                <option value="completed">Completed (update stock)</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>

          <!-- Line Items -->
          <div style="margin-top:14px;padding-top:10px;border-top:1px solid #e2e8f0;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <label class="form-label" style="margin:0;">รายการที่รับ</label>
              <button class="btn-outline" type="button" onclick="addGRItemRow()" style="padding:4px 12px;font-size:9px;">+ เพิ่มรายการ</button>
            </div>
            <div style="background:#f8fafc;border-radius:10px;padding:8px;overflow-x:auto;">
              <table style="width:100%;border-collapse:collapse;font-size:10px;">
                <thead><tr style="color:#64748b;text-transform:uppercase;font-size:9px;">
                  <th style="padding:6px;text-align:left;">สินค้า</th>
                  <th style="padding:6px;text-align:right;width:80px;">จำนวน</th>
                  <th style="padding:6px;text-align:right;width:100px;">ต้นทุน/หน่วย</th>
                  <th style="padding:6px;text-align:right;width:110px;">ยอดย่อย</th>
                  <th style="padding:6px;width:30px;"></th>
                </tr></thead>
                <tbody id="grItemsBody"></tbody>
              </table>
            </div>
          </div>

          <div style="margin-top:12px;padding-top:10px;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:1fr 200px;gap:20px;">
            <div class="form-group" style="margin:0;">
              <label class="form-label">Note</label>
              <input type="text" class="form-input" id="inputNote" placeholder="หมายเหตุ..." />
            </div>
            <div style="display:flex;justify-content:space-between;font-weight:800;color:#1e293b;font-size:13px;align-items:flex-end;"><span>Total:</span><span id="sumTotal">฿0.00</span></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('grModal')">Cancel</button>
          <button class="btn-primary" onclick="saveGR()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("goods-receive.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Purchasing", page: "รับสินค้า" });</script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="goods-receive.js"></script>
  </body>
</html>
