<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathara - Shipping Rates</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/backend.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <i data-lucide="zap" class="sidebar-icon-sm"></i>
          </div>
          <h1 class="sidebar-logo-text">Pathara</h1>
        </div>

        <nav class="sidebar-nav">
          <!-- render จาก sidebar-menu.js -->
        </nav>

        <button class="sidebar-logout">
          <i data-lucide="log-out" class="sidebar-icon-xs"></i>
          <span>ออกจากระบบ</span>
        </button>
      </aside>

      <!-- Main Area -->
      <div class="main-area">
        <!-- Topbar -->
        <header class="topbar">
          <!-- render จาก topbar.js -->
        </header>

        <!-- Content -->
        <div class="content">
          <div class="content-header">
            <div>
              <h2 class="content-title">Shipping Rates</h2>
              <p class="content-subtitle">จัดการอัตราค่าขนส่ง</p>
            </div>
            <div class="content-header-actions">
              <button class="btn-primary" id="addRateBtn">
                <i data-lucide="plus" class="btn-icon"></i>
                Add Rate
              </button>
            </div>
          </div>

          <!-- Status Cards -->
          <div class="stat-cards">
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-all">
                <i data-lucide="calculator" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">All Rates</p>
                <p class="stat-card-value" id="statAll">0</p>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-card-icon stat-card-icon-active">
                <i data-lucide="check-circle" class="stat-icon"></i>
              </div>
              <div>
                <p class="stat-card-label">Active</p>
                <p class="stat-card-value" id="statActive">0</p>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="filter-group">
              <div class="filter-search">
                <i data-lucide="search" class="filter-search-icon"></i>
                <input type="text" placeholder="Search rate..." class="filter-search-input" />
              </div>
            </div>
            <div class="filter-group">
              <select class="form-select filter-sort" id="sortSelect">
                <option value="default">Sort by</option>
                <option value="name-asc">Name A-Z</option>
                <option value="price-asc">Price Low-High</option>
                <option value="price-desc">Price High-Low</option>
              </select>
            </div>
          </div>

          <!-- Shipping Rates Table -->
          <div class="table-container">
            <table class="table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-sort="carrier">ผู้ให้บริการ</th>
                  <th data-sort="zone">โซน</th>
                  <th>ช่วงน้ำหนัก</th>
                  <th data-sort="base" data-sort-type="number">ค่าบริการพื้นฐาน</th>
                  <th data-sort="perkg" data-sort-type="number">ค่าบริการต่อ กก.</th>
                  <th>ระยะเวลา (วัน)</th>
                  <th data-sort="status">สถานะ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="rateTableBody">
                <!-- render จาก JS -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
          <p class="footer-text">&copy; 2026 Pathara. All rights reserved.</p>
          <nav class="footer-nav">
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
            <a href="#" class="footer-link">Support</a>
          </nav>
        </footer>
      </div>
    </div>

    <!-- Modal Add/Edit Rate -->
    <div class="modal-overlay" id="rateModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modalTitle">Add Rate</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />
          <div class="form-group">
            <label class="form-label">Carrier</label>
            <select class="form-select" id="inputCarrier">
              <option value="Kerry Express">Kerry Express</option>
              <option value="Flash Express">Flash Express</option>
              <option value="Thailand Post">Thailand Post</option>
              <option value="J&T Express">J&T Express</option>
              <option value="DHL">DHL</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Zone</label>
            <select class="form-select" id="inputZone">
              <option value="กรุงเทพและปริมณฑล">กรุงเทพและปริมณฑล</option>
              <option value="ภาคกลาง">ภาคกลาง</option>
              <option value="ภาคเหนือ">ภาคเหนือ</option>
              <option value="ภาคอีสาน">ภาคอีสาน</option>
              <option value="ภาคใต้">ภาคใต้</option>
              <option value="ทั่วประเทศ">ทั่วประเทศ</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Weight Min (kg)</label>
            <input type="number" class="form-input" id="inputWeightMin" placeholder="น้ำหนักขั้นต่ำ..." />
          </div>
          <div class="form-group">
            <label class="form-label">Weight Max (kg)</label>
            <input type="number" class="form-input" id="inputWeightMax" placeholder="น้ำหนักสูงสุด..." />
          </div>
          <div class="form-group">
            <label class="form-label">Base Rate (฿)</label>
            <input type="number" class="form-input" id="inputBaseRate" placeholder="ราคาพื้นฐาน..." />
          </div>
          <div class="form-group">
            <label class="form-label">Per KG Rate (฿/kg)</label>
            <input type="number" class="form-input" id="inputPerKg" placeholder="ราคาต่อกิโลกรัม..." />
          </div>
          <div class="form-group">
            <label class="form-label">Est. Days</label>
            <input type="text" class="form-input" id="inputDays" placeholder="e.g. 1-2" />
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <div class="status-toggle">
              <label class="toggle">
                <input type="checkbox" id="inputStatus" checked />
                <span class="toggle-slider"></span>
              </label>
              <span class="status-toggle-label active-label" id="inputStatusLabel">Active</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModalById('rateModal')">Cancel</button>
          <button class="btn-primary" onclick="saveRate()">Save</button>
        </div>
      </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="confirmTitle">Confirm</h3>
          <button class="modal-close"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <p id="confirmMessage" style="font-size: 12px; color: #64748b;"></p>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="confirmCancelBtn">Cancel</button>
          <button class="btn-primary" id="confirmOkBtn">OK</button>
        </div>
      </div>
    </div>

    <script src="../assets/js/table.js"></script>
    <script src="/assets/js/esc-close.js"></script>
    <script src="../assets/js/modal.js"></script>
    <script src="../assets/js/enter-save.js"></script>
    <script src="../assets/js/confirm.js"></script>
    <script src="/modules/backend/assets/js/supabase-client.js"></script>
    <script src="/modules/backend/assets/js/auth-guard.js"></script>
    <script>requireAuth();</script>
    <script src="../assets/js/sidebar-menu.js"></script>
    <script>renderSidebarMenu("shipping-rates.html");</script>
    <script src="/assets/js/topbar.js"></script>
    <script>renderTopbar({ group: "Shipping", page: "อัตราค่าขนส่ง" });</script>
    <script src="/modules/backend/assets/js/random-data.js"></script>
    <script src="shipping-rates.js"></script>
  </body>
</html>
